version: "3.9"

services:
  platform:
    build:
      target: builder
    volumes:
      - ../../:/app
    command: ["go", "run", "./cmd/resolveagent-server"]
    environment:
      RESOLVEAGENT_SERVER_HTTP_ADDR: ":8080"

  runtime:
    volumes:
      - ../../python:/app
    command: ["uv", "run", "python", "-m", "resolveagent.runtime.server"]
