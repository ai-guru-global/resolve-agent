    and decomposes it into two levels. The system first decides whether the request
    should enter structured diagnosis, knowledge retrieval, tool execution, direct
    LLM reasoning, or a budget- and governance-constrained multi-route composition.
    It then selects the most suitable workflow, skill, knowledge collection, or model
    route inside that chosen path. The design principle is explicit: **first allocate
    the right mechanism under constraints, then choose the right target instance,
    and only then reason or execute**, rather than assuming that every task belongs
    inside one monolithic LLM-centered loop.'
  target: 我们的答案是 **ResolveAgent**。与将所有请求一律纳入同一个智能体循环不同，ResolveAgent 将“路由”视为一等研究对象，并进一步将其拆分为两个层次：系统首先判断请求应进入结构化诊断、知识检索、工具执行、直接
    LLM 推理，还是受预算和治理约束的多路线组合；随后再在所选路线内部选择最合适的工作流、技能、知识集合或模型路由。这个设计选择背后的思想非常明确：**先做受约束的机制分配，再做目标级实例选择，最后才进行推理或执行**，而不是默认所有任务都适合进入统一的大模型
    `agent loop`。
- source_lang: zh
  target_lang: en
  source: 与先前版本相比，本文进一步系统性地扩展了理论和方法部分，重点强调三类顶会级创新视角。第一，本文不再将路由视为单步分类问题，而是提出**层次化效用决策**，显式建模“执行基底选择”和“目标/模型实例选择”的联动关系。第二，本文首次将**控制平面一致性**从工程假设提升为优化目标的一部分，通过一致性正则和反事实稳定性训练，使选择器对注册表漂移、运行时快照陈旧和路由同步滞后更加鲁棒。第三，本文将
    `Multi` 从经验性后处理改写为一个**证据价值驱动的有界信息获取过程**，从而避免开放式多步试错造成的延迟放大和风险膨胀。
  target: Compared with earlier versions, this paper substantially expands both theory
    and method and emphasizes three conference-level innovation perspectives. First,
    routing is no longer treated as a one-step classification task but as **hierarchical
    utility decision making** that explicitly models the coupling between execution-substrate
    selection and target/model-instance selection. Second, **control-plane consistency**
    is elevated from an engineering assumption to part of the optimization objective
    through a consistency regularizer and counterfactual stability training, making
    the selector more robust to registry drift, stale runtime snapshots, and route-synchronization
    lag. Third, `Multi` is reformulated from a heuristic fallback into a **bounded
    information-acquisition process driven by evidence value**, avoiding the latency
    explosion and risk inflation common in open-ended multi-step trial-and-error behavior.
