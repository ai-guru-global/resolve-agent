  source: '**证明思路。** 可行性裁剪首先从候选集中剔除所有被策略识别为不安全的动作。最终被保留的不安全动作只能来自安全判别器的漏判集合，因此其概率质量上界由漏判率决定。该命题说明，安全治理不是路由后的附加模块，而是候选空间的先验约束。'
  target: '**Proof sketch.** Feasibility pruning removes all actions recognized as
    unsafe by policy. Therefore, any unsafe action that survives must belong to the
    discriminator’s false-negative set. The surviving unsafe probability mass is thus
    upper-bounded by the false-negative rate. The proposition formalizes that safety
    governance is not a post-routing patch, but a prior constraint on the candidate
    space.'
