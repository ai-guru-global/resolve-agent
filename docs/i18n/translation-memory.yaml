  source: 虽然本文采用专家标注、时间感知切分和跨基线共享基础设施，但残余标注噪声与组织流程偏差仍可能影响路由质量估计。历史生产事件记录中也包含既有人工处理习惯，这可能使“正确路线”的定义对现有运维流程存在依赖。此外，某些复杂事件在工单摘要阶段就已经被人为压缩，这会放大部分路线类别的歧义。
  target: Although we use expert annotation, time-aware splits, and shared infrastructure
    across baselines, residual annotation noise and organizational-process bias may
    still affect routing-quality estimates. Historical incident records also encode
    prior human handling habits, which may make the notion of a “correct route” partially
    dependent on existing operational workflows. In addition, some complex incidents
    are already compressed when summarized in tickets, which can amplify ambiguity
    between route classes.
