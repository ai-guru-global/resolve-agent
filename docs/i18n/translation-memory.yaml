  target: "# ResolveAgent: A Consistency-Aware Hierarchical Utility-Calibrated Routing\
    \ Framework for Autonomous IT Operations\n\n**Authors:** Anonymous Submission\n\
    \n---\n\n## Abstract\n\nThe core challenge of autonomous IT operations is not\
    \ merely insufficient model reasoning power, but how to assign each request to\
    \ the correct reasoning and execution mechanism under heterogeneous tasks, constrained\
    \ permissions, and dynamic infrastructure states. Real production incidents often\
    \ require structured diagnosis, operational knowledge retrieval, safe tool execution,\
    \ configuration-consistency validation, and conservative handling of uncertainty\
    \ at the same time. This paper presents **ResolveAgent**, a unified AIOps platform\
    \ that routes requests among `FTA`, `RAG`, `Skill`, `Direct-LLM`, and budget-bounded\
    \ `Multi` through a **consistency-aware hierarchical utility-calibrated Intelligent\
    \ Selector**. Unlike prior systems that either perform only single-stage label\
    \ classification or rely on LLM-only tool choice, ResolveAgent formulates routing\
    \ as a two-level constrained optimization problem that jointly selects the **execution\
    \ substrate** and the **target/model instance**, while explicitly incorporating\
    \ task quality, latency, execution cost, operational risk, and control-plane consistency\
    \ discrepancy into a unified objective. Around this objective, we introduce three\
    \ new technical mechanisms: 1) capability-graph and permission-snapshot based\
    \ feasibility pruning; 2) a control-plane consistency regularizer and counterfactual\
    \ stability objective for registry drift; and 3) a bounded `Multi` route triggered\
    \ by evidence value. At the system level, ResolveAgent organizes the `Go` control\
    \ plane with a unified registry, dynamic route synchronizer, and `Higress` model-routing\
    \ layer together with the `Python` runtime for intent estimation, context enrichment,\
    \ `FTA` evaluators, and permission-bounded skill execution as a Single Source\
    \ of Truth architecture. Experiments on 2,847 anonymized production incidents,\
    \ 5,000 operations QA pairs, and 500 tool-execution cases show that `ResolveAgent-Hybrid`\
    \ achieves 89.3% routing accuracy, 83.5% target-selection accuracy, and 25.1-minute\
    \ incident `MTTR`, reducing `MTTR` by 47% relative to manual workflows and by\
    \ an additional 15% relative to an LLM-only router. More importantly, hierarchical\
    \ decision making, consistency-aware regularization, and the counterfactual stability\
    \ objective reduce route flip rate under injected 3-second registry lag from 13.5%\
    \ to 5.6%, while also improving calibration, robustness, governance, and real-world\
    \ scenario performance. The results suggest that the decisive innovations for\
    \ conference-level autonomous operations research should move beyond “stronger\
    \ models” toward **governance-constrained hierarchical decision making, structured\
    \ evidence consumption, and control-plane consistency-driven system design**.\n\
    \n---\n\n## 1. Introduction\n\nWith the widespread adoption of cloud-native architectures,\
    \ microservices, container orchestration, and multi-tenant platforms, IT operations\
    \ has evolved from “single-point monitoring plus manual troubleshooting” into\
    \ a complex decision system driven by multi-source observability data. In real\
    \ production environments, one operational request may simultaneously involve\
    \ several capabilities:\n\n- **Structured fault diagnosis**, e.g., root-cause\
    \ localization via causal chains and fault trees;\n- **Operational knowledge retrieval**,\
    \ e.g., querying historical incident handling records, `runbooks`, `SOP`s, and\
    \ postmortems;\n- **External tool execution**, e.g., log analysis, metric inspection,\
    \ deployment auditing, configuration diffing, and permission-bounded actions;\n\
    - **Open-ended reasoning and response generation**, e.g., synthesizing evidence\
    \ into explanations, recommendations, and operator-facing communication;\n- **Configuration\
    \ and capability-consistency handling**, e.g., determining whether a skill, workflow,\
    \ or model route is truly available under the current tenant, version, and runtime\
    \ state.\n\nTherefore, real operational requests are inherently **heterogeneous**\
    \ and **time-varying**. Some requests require structured causal analysis, some\
    \ are knowledge-intensive QA, some involve privileged external actions, and others\
    \ are better handled by direct LLM reasoning. More importantly, even for semantically\
    \ similar requests, the optimal route may change over time because of system capability\
    \ state, knowledge freshness, skill health, or control-plane propagation delay.\
    \ Existing approaches typically strengthen only one side of this problem: traditional\
    \ AIOps emphasizes anomaly detection, alert correlation, and fault management\
    \ [1]; LLM-only agents emphasize natural-language reasoning and flexible interaction\
    \ [3,4]; tool-augmented language models emphasize external tool use [5]; retrieval-augmented\
    \ models emphasize grounding and factuality [6,7,8]. For autonomous operations,\
    \ however, the key question is not “which capability is strongest,” but rather:\n\
    \n> **Under safety, latency, capability-feasibility, and control-plane consistency\
    \ constraints, which mechanism, target, and model class should handle the current\
    \ request?**\n\nThis leads to the central research question of this paper:\n\n\
    > **How can we route heterogeneous operational requests to the most appropriate\
    \ execution mode and target instance while preserving accuracy, latency efficiency,\
    \ safety, configuration consistency, and runtime executability?**\n\nOur answer\
    \ is **ResolveAgent**. Instead of pushing all requests into a single agent loop,\
    \ ResolveAgent treats routing as a first-class research problem and decomposes\
    \ it into two levels. The system first decides whether the request should enter\
    \ structured diagnosis, knowledge retrieval, tool execution, direct LLM reasoning,\
    \ or a budget- and governance-constrained multi-route composition. It then selects\
    \ the most suitable workflow, skill, knowledge collection, or model route inside\
    \ that chosen path. The design principle is explicit: **first allocate the right\
    \ mechanism under constraints, then choose the right target instance, and only\
    \ then reason or execute**, rather than assuming that every task belongs inside\
    \ one monolithic LLM-centered loop.\n\nCompared with earlier versions, this paper\
    \ substantially expands both theory and method and emphasizes three conference-level\
    \ innovation perspectives. First, routing is no longer treated as a one-step classification\
    \ task but as **hierarchical utility decision making** that explicitly models\
    \ the coupling between execution-substrate selection and target/model-instance\
    \ selection. Second, **control-plane consistency** is elevated from an engineering\
    \ assumption to part of the optimization objective through a consistency regularizer\
    \ and counterfactual stability training, making the selector more robust to registry\
    \ drift, stale runtime snapshots, and route-synchronization lag. Third, `Multi`\
    \ is reformulated from a heuristic fallback into a **bounded information-acquisition\
    \ process driven by evidence value**, avoiding the latency explosion and risk\
    \ inflation common in open-ended multi-step trial-and-error behavior.\n\nThe main\
    \ contributions of this paper are as follows:\n\n1. We propose a **consistency-aware\
    \ hierarchical utility-calibrated routing framework** that models operational\
    \ decision making as a two-level constrained optimization problem over execution\
    \ substrates and target instances.\n2. We introduce an explicit control-plane\
    \ discrepancy term \\\\(\\Delta_{\\mathrm{cp}}\\\\) and a counterfactual stability\
    \ objective, making control-plane lag, capability-snapshot drift, and policy-update\
    \ delay measurable and optimizable research variables.\n3. We propose an evidence-value-driven\
    \ bounded `Multi` mechanism that turns multi-route composition from open-ended\
    \ trial behavior into a budgeted information-acquisition process with explicit\
    \ gain conditions.\n4. We integrate the unified `Go` control-plane registry, dynamic\
    \ route synchronization, `Higress` model routing, and the `Python` runtime for\
    \ intent estimation, context enrichment, AI-augmented `FTA`, and permission-bounded\
    \ skill execution into a Single Source of Truth architecture.\n5. We evaluate\
    \ the system from multiple angles—including main results, ablations, calibration,\
    \ stability, governance and safety, real-world scenarios, and error analysis—against\
    \ manual workflows, rule routers, LLM routers, general agents, and structural-control\
    \ baselines.\n6. Through theory and experiments together, we show that the critical\
    \ gains of autonomous operations systems come from **mechanism matching, evidence\
    \ organization, and governance consistency**, not merely larger language models\
    \ or longer tool chains.\n\n---\n\n## 2. Related Work and Research Positioning\n\
    \n### 2.1 AIOps and Incident Management\n\nAIOps research has long focused on\
    \ anomaly detection, fault management, event understanding, and automation support\
    \ in large-scale systems [1]. This line of work establishes the classic “observe–detect–alert–manage”\
    \ pipeline, but it usually treats the allocation of requests across multiple execution\
    \ mechanisms as an implementation detail rather than an explicit research problem.\
    \ In contrast, incident-response studies emphasize the importance of operational\
    \ context, response playbooks, and auditable workflows [2], suggesting that incident\
    \ handling is not merely free-form generation but requires structured, traceable\
    \ logic that can align with organizational processes.\n\n### 2.2 LLM Reasoning,\
    \ Tool Use, and Retrieval Augmentation\n\nChain-of-thought prompting and zero-shot\
    \ reasoning demonstrate that large language models can perform substantially stronger\
    \ decomposition and reasoning on complex tasks [3,4]. `Toolformer` further shows\
    \ that models can learn when to invoke external tools [5]. Retrieval-augmented\
    \ language models and retrieval-based revision methods improve factual grounding\
    \ and response correction [6,7]. Mallen et al. show that the relative value of\
    \ parametric and non-parametric memory strongly depends on task type and knowledge\
    \ freshness [8]. Collectively, these findings suggest that retrieval and tools\
    \ are not universally helpful; whether they should be invoked, which one should\
    \ be invoked, and when they should be avoided are themselves modeling problems.\n\
    \n### 2.3 Limitations of Agent-Orchestration Systems\n\nGeneral agent frameworks\
    \ typically adopt a “perceive–think–act” loop and place all requests into one\
    \ unified planning–execution paradigm. Such designs are flexible in open environments,\
    \ but they exhibit three important weaknesses in autonomous operations. First,\
    \ they often lack **explicit risk modeling**, and therefore do not naturally distinguish\
    \ between “wrong but reversible text generation” and “wrong and high-cost external\
    \ actuation.” Second, they commonly treat **tool choice** as part of prompt strategy\
    \ rather than as a system decision jointly constrained by platform metadata, permission\
    \ boundaries, and runtime state. Third, prior work rarely includes **control-plane\
    \ consistency** in its research objective, allowing state mismatches among registries,\
    \ gateways, executors, and observability components to remain invisible.\n\n###\
    \ 2.4 Research Gap and Our Positioning\n\nDespite substantial progress in reasoning,\
    \ retrieval, and tool use, autonomous operations still faces at least five gaps:\n\
    \n1. **Routing is handled implicitly.** Many systems assume all requests should\
    \ flow through one unified LLM or one unified `agent`, without an explicit model\
    \ of which path is more appropriate.\n2. **Decision hierarchy is flattened.**\
    \ Most methods predict a single label and do not distinguish between choosing\
    \ the execution substrate first and the target/model instance second.\n3. **Risk\
    \ constraints are weakly expressed.** Many tool-augmented methods focus on whether\
    \ tools can be called, but fewer analyze when invocation is safe, trustworthy,\
    \ and deployable.\n4. **Control-plane consistency is largely ignored.** In real\
    \ platforms, inconsistency among registries, gateways, workflows, and executors\
    \ directly damages routing validity and execution success.\n5. **Multi-route composition\
    \ lacks a gain criterion.** Many agentic systems keep appending actions under\
    \ uncertainty, yet provide no explicit information-value condition or budget boundary.\n\
    \nAccordingly, the contribution of ResolveAgent is not “another larger operations\
    \ agent,” but a unified principle for organizing autonomous operations around\
    \ **consistency-aware hierarchical utility routing**. The emphasis is not on local\
    \ optimality of individual modules, but on making globally governed decisions\
    \ across heterogeneous reasoning and execution substrates while tightly coupling\
    \ those decisions to the control plane, model routing layer, and runtime synchronization\
    \ mechanisms.\n\n---\n\n## 3. System Overview\n\nResolveAgent decomposes autonomous\
    \ operations into two coupled but clearly separated layers:\n\n- **Routing layer:**\
    \ the `Intelligent Selector`, which chooses among execution modes based on request\
    \ semantics, contextual state, capability feasibility, configuration consistency,\
    \ and risk constraints;\n- **Execution layer:** the actual `FTA`, `RAG`, `Skill`,\
    \ `Direct-LLM`, and budget-bounded `Multi` execution substrates that perform diagnosis,\
    \ retrieval, action, or response generation.\n\nMore importantly, these layers\
    \ are not loosely stitched together. They are kept consistent in terms of capability\
    \ metadata, permission policy, model routes, gateway exposure, and runtime snapshots\
    \ through a Single Source of Truth control plane.\n\n### Figure 1. ResolveAgent\
    \ System Architecture\n\n```mermaid\nflowchart TD\n    A[Operational Request /\
    \ Production Incident / QA] --> B[Intelligent Selector]\n\n    subgraph S1[Stage\
    \ 1: Intent Estimation]\n      B1[Request Encoding]\n      B2[Operational Entity\
    \ Extraction]\n      B3[Initial Route Prior]\n    end\n\n    subgraph S2[Stage\
    \ 2: Context Enrichment and Capability Pruning]\n      C1[Dialogue State]\n  \
    \    C2[Capability Graph Query]\n      C3[Runtime Health Check]\n      C4[Permission\
    \ and Tenant Scope Validation]\n      C5[Feasible Route Set]\n    end\n\n    subgraph\
    \ S3[Stage 3: Hierarchical Utility Scoring, Calibration, and Abstention]\n   \
    \   D1[Execution-Substrate Scoring]\n      D2[Target / Model-Instance Scoring]\n\
    \      D3[Temperature Calibration]\n      D4[Confidence Check and Decision]\n\
    \    end\n\n    B --> S1 --> S2 --> S3\n\n    D4 --> E1[FTA Structured Diagnosis]\n\
    \    D4 --> E2[RAG Knowledge Retrieval]\n    D4 --> E3[Skill Sandbox Execution]\n\
    \    D4 --> E4[Direct-LLM Reasoning]\n    D4 --> E5[Budgeted Multi Route]\n\n\
    \    subgraph CP[Single Source of Truth Control Plane]\n      F1[Skill Registry]\n\
    \      F2[Workflow Registry]\n      F3[Model Route Definitions]\n      F4[Permission\
    \ Policy]\n      F5[Gateway Metadata]\n      F6[Runtime Capability Snapshots]\n\
    \    end\n\n    CP --> B\n    CP --> E1\n    CP --> E2\n    CP --> E3\n    CP\
    \ --> E4\n    CP --> E5\n\n    E1 --> G[Evidence Aggregation and Response Generation]\n\
    \    E2 --> G\n    E3 --> G\n    E4 --> G\n    E5 --> G\n\n    G --> H[Audited\
    \ Output / Remediation Advice / Controlled Execution Result]\n```\n\nThe key system\
    \ principle conveyed by Figure 1 is that **routing and execution are decoupled,\
    \ but capability and governance metadata must remain globally consistent**. The\
    \ system does not simply “let the LLM decide everything.” Instead, it first determines\
    \ the most appropriate execution mechanism under explicit constraints, and only\
    \ then reasons or operates within a bounded safety envelope.\n\n### Figure 2.\
    \ Inference Procedure of the Intelligent Selector\n\n```mermaid\nflowchart LR\n\
    \    A[Input Request x] --> B[Encode Request and Dialogue State]\n    B --> C[Estimate\
    \ Route Prior]\n    C --> D[Query Capability Graph and Runtime State]\n    D -->\
    \ E{Is the Route Available and Safe?}\n    E -- No --> F[Remove from Candidate\
    \ Set]\n    E -- Yes --> G[Compute Execution-Substrate Utility U_route]\n    G\
    \ --> H[Compute Target / Model Utility U_target]\n    H --> I[Apply Temperature\
    \ Calibration to Joint Score]\n    I --> J{max p(a,z) >= τ and margin >= δ ?}\n\
    \    J -- No --> K[Abstain / Clarify / Conservative Fallback]\n    J -- Yes -->\
    \ L[Execute Best Route]\n    L --> M{Evidence Coverage E < η and budget allows?}\n\
    \    M -- No --> N[Return Audited Result]\n    M -- Yes --> O[Trigger Bounded\
    \ Multi Fallback]\n    O --> N\n```\n\nThis procedure shows that the selector\
    \ is not a black-box classifier. It is a hierarchically constrained decision module\
    \ that must answer three questions simultaneously: which route is better, which\
    \ target or model is better inside that route, and whether the system should make\
    \ the decision automatically at all.\n\n### 3.1 Code-Driven System Highlights\n\
    \nUnlike papers that remain purely at the method level, ResolveAgent’s design\
    \ is strongly aligned with the current codebase, which provides concrete systems\
    \ support for the paper’s claims:\n\n1. **Single Source of Truth control plane.**\
    \ The `Go` control plane uniformly manages `Agent`, `Skill`, `Workflow`, and `ModelRoute`\
    \ metadata, including `status`, `labels`, `version`, and `config`, so the capability\
    \ graph is conditioned on real platform state rather than static assumptions.\n\
    2. **Layered model-routing governance.** The `Higress` routing layer not only\
    \ abstracts a unified model entry but also centralizes rate limiting, retry, fallback,\
    \ request rewriting, and provider compatibility, allowing “which model to use”\
    \ to become a second-level target decision rather than ad hoc runtime branching.\n\
    3. **Dynamic route synchronization and state gating.** The route synchronizer\
    \ exposes gateway routes dynamically according to `active` agents and `ready`\
    \ skills in the registry, giving the system a semantics in which availability\
    \ constraints truly shape reachable traffic.\n4. **Hybrid Intelligent Selector.**\
    \ The `Python` runtime contains intent analyzers, context enrichers, and rule/LLM/hybrid\
    \ strategies that provide priors, context, and confidence signals for hierarchical\
    \ utility decision making.\n5. **Permission-bounded skill execution.** The `manifest`\
    \ explicitly declares network access, file-system access, allowed hosts, resource\
    \ budgets, and timeout limits, making risk a structured term in the routing objective\
    \ rather than a runtime patch.\n\n### Figure 3. Control-Plane Consistency and\
    \ the Route-Synchronization Feedback Loop\n\n```mermaid\nflowchart LR\n    REG[SSOT\
    \ Registry<br/>Agent / Skill / Workflow / ModelRoute] --> SYNC[Route Sync / Reconciler]\n\
    \    REG --> SNAP[Runtime Capability Snapshot]\n    REG --> POL[Policy Snapshot]\n\
    \    SYNC --> GW[Higress Gateway]\n    GW --> MR[Provider-Agnostic Model Routes]\n\
    \    SNAP --> SEL[Intelligent Selector]\n    POL --> SEL\n    SEL --> EXEC[FTA\
    \ / RAG / Skill / Direct-LLM]\n    EXEC --> OBS[Logs / Metrics / Trace / Events]\n\
    \    OBS --> FEED[Online Feedback \\& Recalibration]\n    FEED --> REG\n```\n\n\
    Figure 3 highlights the most important difference between this work and prior\
    \ agent-routing papers: **routing decisions are not isolated classifier outputs,\
    \ but part of a continuously synchronized, continuously observed, continuously\
    \ recalibrated control loop**. This loop is grounded in the current codebase through\
    \ the unified registry, route synchronizer, model router, authentication middleware,\
    \ and runtime capability snapshots.\n\n---\n\n## 4. Problem Formulation\n\n###\
    \ 4.1 Action Space, Target Space, and Feasible Domain\n\nLet the request be \\\
    \\(x\\\\), the context be \\\\(c\\\\), and the capability inventory together with\
    \ runtime state be \\\\(K\\\\). We define the execution-substrate action space\
    \ as\n\n$$\n\\mathcal{A}=\\{\\mathrm{FTA},\\mathrm{Skill},\\mathrm{RAG},\\mathrm{Direct\\\
    mbox{-}LLM},\\mathrm{Multi}\\}\n$$\n\nwhere `FTA` denotes structured fault-tree\
    \ diagnosis, `Skill` denotes externally executed tools under safety constraints,\
    \ `RAG` denotes retrieval-augmented generation, `Direct-LLM` denotes direct language-model\
    \ reasoning, and `Multi` denotes budget-bounded multi-route composition.\n\nUnlike\
    \ one-stage classification, ResolveAgent further defines an internal target set\
    \ \\\\(\\mathcal{Z}(a,K)\\\\) for each action. For example, when \\\\(a=\\mathrm{Skill}\\\
    \\), \\\\(z\\\\) denotes a concrete skill; when \\\\(a=\\mathrm{FTA}\\\\), \\\\\
    (z\\\\) denotes a workflow or fault tree; when \\\\(a=\\mathrm{RAG}\\\\), \\\\\
    (z\\\\) denotes a knowledge collection; and when \\\\(a=\\mathrm{Direct\\mbox{-}LLM}\\\
    \\), \\\\(z\\\\) denotes a model-route instance. The system therefore solves not\
    \ a single action choice, but the joint choice \\\\((a,z)\\\\).\n\nNot every action\
    \ and target is feasible at every moment. We therefore define the joint feasible\
    \ set:\n\n$$\n\\Omega_f(x,c,K)=\\left\\{(a,z) \\mid a\\in\\mathcal{A},\\ z\\in\\\
    mathcal{Z}(a,K),\\ I_{\\mathrm{avail}}(a,z,K)=1,\\ I_{\\mathrm{safe}}(a,z,x,c,K)=1\\\
    right\\}\n$$\n\nwhere \\\\(I_{\\mathrm{avail}}\\\\) is the capability-availability\
    \ indicator and \\\\(I_{\\mathrm{safe}}\\\\) is the safety-and-policy indicator\
    \ under permission constraints. This definition makes clear that the first step\
    \ of routing is not “compare which route is strongest,” but first eliminate paths\
    \ and targets that do not exist, are unreachable, are unsynchronized, or should\
    \ not be triggered.\n\n### 4.2 Hierarchical Utility-Maximization Objective\n\n\
    ResolveAgent formulates joint decision making as a two-level constrained optimization\
    \ problem:\n\n$$\n(a^*,z^*)=\\arg\\max_{(a,z)\\in\\Omega_f(x,c,K)} U_{\\mathrm{route}}(a\\\
    mid x,c,K)+\\mu U_{\\mathrm{target}}(z\\mid a,x,c,K)-\\lambda_s\\,\\mathrm{switch}(a,z)\n\
    $$\n\nwhere:\n\n- \\\\(U_{\\mathrm{route}}\\\\) measures expected utility at the\
    \ execution-substrate level;\n- \\\\(U_{\\mathrm{target}}\\\\) measures fitness\
    \ of the target or model instance inside the selected route;\n- \\\\(\\mu\\\\\
    ) controls the importance of second-level target scoring;\n- \\\\(\\mathrm{switch}(a,z)\\\
    \\) denotes coordination cost, context-assembly cost, or gateway hop cost caused\
    \ by cross-substrate or cross-target switching;\n- \\\\(\\lambda_s\\\\) is the\
    \ corresponding weight.\n\nThe execution-substrate utility is defined as\n\n$$\n\
    U_{\\mathrm{route}}(a)=\\lambda_q \\hat{Q}(a)-\\lambda_l \\hat{L}(a)-\\lambda_c\
    \ \\hat{C}(a)-\\lambda_r \\hat{R}'(a)\n$$\n\nand the second-level target utility\
    \ is\n\n$$\nU_{\\mathrm{target}}(z\\mid a)=\\psi_1\\,\\hat{M}(z\\mid a)+\\psi_2\\\
    ,\\hat{F}(z)-\\psi_3\\,\\hat{D}(z)\n$$\n\nwhere \\\\(\\hat{M}(z\\mid a)\\\\) denotes\
    \ the match between the target instance and the selected action, \\\\(\\hat{F}(z)\\\
    \\) denotes freshness and health, and \\\\(\\hat{D}(z)\\\\) denotes target-level\
    \ drift or risk penalty. This decomposition naturally accommodates the codebase’s\
    \ two-level decision structure: the `Python` runtime chooses execution substrates,\
    \ while the `Go + Higress` control plane chooses or constrains model and route\
    \ instances.\n\n### 4.3 Consistency-Aware Risk Regularization\n\nThe most important\
    \ new quantity introduced in this paper is the **control-plane consistency discrepancy**.\
    \ Let the discrepancy of a target instance across registry, gateway, and runtime\
    \ views be\n\n$$\n\\Delta_{\\mathrm{cp}}(z,t)=w_v\\,\\mathbf{1}[v_{\\mathrm{reg}}\\\
    neq v_{\\mathrm{rt}}]+w_s\\,\\mathbf{1}[s_{\\mathrm{reg}}\\neq s_{\\mathrm{rt}}]+w_\\\
    ell\\log\\left(1+\\mathrm{lag}(z,t)\\right)\n$$\n\nwhere:\n\n- \\\\(v_{\\mathrm{reg}}\\\
    \\) and \\\\(v_{\\mathrm{rt}}\\\\) are version information from the registry and\
    \ runtime views, respectively;\n- \\\\(s_{\\mathrm{reg}}\\\\) and \\\\(s_{\\mathrm{rt}}\\\
    \\) are control-plane and runtime states;\n- \\\\(\\mathrm{lag}(z,t)\\\\) denotes\
    \ propagation delay of target-instance state;\n- \\\\(w_v,w_s,w_\\ell\\\\) are\
    \ nonnegative weights.\n\nBased on this quantity, we extend the traditional operational-risk\
    \ term into\n\n$$\n\\hat{R}'(a,z)=\\hat{R}_{\\mathrm{op}}(a,z)+\\kappa\\,\\Delta_{\\\
    mathrm{cp}}(z,t)\n$$\n\nwhere \\\\(\\hat{R}_{\\mathrm{op}}\\\\) captures permission\
    \ level, blast radius, and irreversibility risk of the action itself, and \\\\\
    (\\kappa\\\\) is the consistency-penalty coefficient. The intuition is crucial:\
    \ **even if an action is semantically appropriate, it should be treated as higher\
    \ risk when its target instance resides in a stale, unsynchronized, or inconsistent\
    \ control plane.**\n\n### 4.4 Training Objective: Calibration, Stability, and\
    \ Safety\n\nTo keep hierarchical decisions stable under distribution shift and\
    \ control-plane perturbations, we optimize the following joint training objective:\n\
    \n$$\n\\mathcal{L}=\\mathcal{L}_{\\mathrm{CE}}+\\lambda_{\\mathrm{cal}}\\mathcal{L}_{\\\
    mathrm{Brier}}+\\lambda_{\\mathrm{stab}}\\mathcal{L}_{\\mathrm{stab}}+\\lambda_{\\\
    mathrm{safe}}\\mathcal{L}_{\\mathrm{unsafe}}\n$$\n\nwhere:\n\n- \\\\(\\mathcal{L}_{\\\
    mathrm{CE}}\\\\) is the supervised route/target loss;\n- \\\\(\\mathcal{L}_{\\\
    mathrm{Brier}}\\\\) encourages confidence calibration;\n- \\\\(\\mathcal{L}_{\\\
    mathrm{stab}}\\\\) suppresses route flips under mild control-plane perturbations;\n\
    - \\\\(\\mathcal{L}_{\\mathrm{unsafe}}\\\\) explicitly depresses scores of unsafe\
    \ candidates.\n\nThe stability loss is defined as\n\n$$\n\\mathcal{L}_{\\mathrm{stab}}=\\\
    mathrm{KL}\\left(p_\\theta(\\cdot\\mid x,c,K)\\,\\Vert\\,p_\\theta(\\cdot\\mid\
    \ x,c,\\tilde{K})\\right)\n$$\n\nwhere \\\\(\\tilde{K}\\\\) denotes a counterfactual\
    \ capability snapshot under mild perturbations such as temporary skill unavailability,\
    \ flipped status bits, increased synchronization delay, or short-lived model-route\
    \ failures. The unsafe loss is defined as\n\n$$\n\\mathcal{L}_{\\mathrm{unsafe}}=\\\
    max\\left(0,\\,m+\\max_{(a,z)\\in\\Omega_u}U(a,z)-U(a_y,z_y)\\right)\n$$\n\nwhere\
    \ \\\\(\\Omega_u\\\\) is the unsafe-candidate set and \\\\(m\\\\) is a safety\
    \ margin. This objective makes the model learn not only “which route is more correct,”\
    \ but also “which mistakes are especially unacceptable.”\n\n### 4.5 Evidence Coverage,\
    \ Information Value, and Bounded `Multi`\n\nIn some situations, a single route\
    \ may be optimal yet still insufficiently supported by evidence. We therefore\
    \ define evidence coverage as\n\n$$\nE=\\alpha_s S+\\alpha_d D+\\alpha_f F-\\\
    alpha_c C_{\\mathrm{contra}}\n$$\n\nwhere:\n\n- \\\\(S\\\\) denotes support strength;\n\
    - \\\\(D\\\\) denotes source diversity;\n- \\\\(F\\\\) denotes evidence freshness;\n\
    - \\\\(C_{\\mathrm{contra}}\\\\) denotes contradiction level among evidence sources.\n\
    \nWe view `Multi` as a bounded information-acquisition action. Given primary route\
    \ \\\\(a\\\\) and candidate supplementary route \\\\(b\\\\), the second route\
    \ is triggered only when\n\n$$\n\\lambda_q\\,\\Delta Q_{b\\mid a}>\\lambda_l\\\
    ,\\Delta L_{b\\mid a}+\\lambda_c\\,\\Delta C_{b\\mid a}+\\lambda_r\\,\\Delta R_{b\\\
    mid a}\n$$\n\nand the current evidence coverage satisfies \\\\(E<\\eta\\\\). Here\
    \ \\\\(\\Delta Q_{b\\mid a}\\\\) represents the expected quality improvement or\
    \ uncertainty reduction gained by adding supplementary evidence. This definition\
    \ matters because `Multi` is no longer a vague “try a few more paths,” but a **conservative\
    \ compensation mechanism driven by evidence value and bounded by explicit budget\
    \ constraints**.\n\n---\n\n## 5. Method\n\n### 5.1 Request Representation: Fusing\
    \ Semantic, Operational, Capability, and Code/Configuration Signals\n\nFor each\
    \ request, the Intelligent Selector constructs five signal families:\n\n1. **Lexical\
    \ and syntactic signals:** keywords, action verbs, anomaly descriptions, and question\
    \ structure from the request text itself;\n2. **Operational entity signals:**\
    \ service name, environment, severity, symptom type, resource object, and alert\
    \ source;\n3. **Dialogue-state signals:** whether the user asks for explanation,\
    \ diagnosis, execution, remediation advice, or simple knowledge lookup;\n4. **Capability-state\
    \ signals:** whether corresponding skills, retrieval collections, workflows, and\
    \ model routes currently exist in the registry;\n5. **Code/configuration signals:**\
    \ code blocks, configuration fragments, security smells, anomalous fields, and\
    \ latent target hints extracted by the context enricher.\n\nThe unified representation\
    \ is denoted by\n\n$$\nh=[h_x;h_{\\mathrm{ops}};h_{\\mathrm{dlg}};h_{\\mathrm{cap}};h_{\\\
    mathrm{cfg}}]\n$$\n\nwhere \\\\(h_{\\mathrm{cfg}}\\\\) is particularly important\
    \ because much operational information is embedded in logs, configurations, alert\
    \ fields, and code snippets rather than plain natural language. Compared with\
    \ routers that only inspect text, this step enables the system to distinguish\
    \ code/configuration-heavy requests from pure knowledge questions and to use richer\
    \ context for route selection.\n\n### 5.2 Registry-Conditioned Capability Graph\n\
    \nResolveAgent maintains a typed capability graph that maps request patterns to\
    \ skills, retrieval collections, workflows, and model routes. The graph contains:\n\
    \n- route nodes: `FTA`, `Skill`, `RAG`, `Direct-LLM`, `Multi`;\n- target nodes:\
    \ workflows, skills, knowledge collections, model routes;\n- state nodes: version,\
    \ health, permission labels, tenant scope, rate limits, and budgets;\n- policy\
    \ nodes: approval requirements, side-effect classes, and network/file-system access\
    \ constraints.\n\nGiven request \\\\(x\\\\), the system checks:\n\n- whether service\
    \ and tenant scopes match;\n- whether the required skill or retrieval collection\
    \ exists;\n- whether the current runtime health allows invocation;\n- whether\
    \ the gateway and control plane are synchronized to the same version;\n- whether\
    \ permissions and policy permit execution;\n- whether the action is reversible\
    \ and whether it expands blast radius.\n\nThis step moves feasibility to the front\
    \ of the pipeline. In particular, when skill endpoints are down, knowledge bases\
    \ are stale, model routes are being switched, or permissions are insufficient,\
    \ the system must prune those routes first rather than letting a downstream LLM\
    \ keep preferring an option that is not actually executable.\n\n### 5.3 Layered\
    \ Target and Model Routing: From Execution Substrate to Concrete Instance\n\n\
    A key innovation of ResolveAgent is to separately model execution-substrate selection\
    \ and target-instance selection. In practice, the inner choice often determines\
    \ final quality and latency. For example:\n\n- inside `FTA`, the system must choose\
    \ which workflow tree to use;\n- inside `Skill`, it must choose which concrete\
    \ skill to call;\n- inside `RAG`, it must decide which knowledge collection to\
    \ query;\n- inside `Direct-LLM`, it must select a provider and model route.\n\n\
    The current code architecture naturally supports this layered design. The `Python`\
    \ selector decides which execution plane to enter at runtime, while the `Go +\
    \ Higress` model router pushes provider differences, unified entry points, retries,\
    \ rate limiting, and request transformation down to the gateway layer. This means\
    \ the hierarchical method is not merely a theoretical abstraction; it directly\
    \ leverages the existing system structure of **runtime substrate selection plus\
    \ control-plane instance selection**.\n\n### 5.4 Counterfactual Stability and\
    \ Selective Abstention\n\nFor each feasible route and target instance, the selector\
    \ computes joint utility and applies temperature calibration. Unlike traditional\
    \ classifiers that only produce scores, the scoring process here is an explicit\
    \ multi-objective tradeoff:\n\n- structured problems receive higher `FTA` quality\
    \ terms;\n- high-latency open-ended generation is suppressed by cost and latency\
    \ terms on simple requests;\n- side-effectful skill invocation is penalized under\
    \ low evidence or high uncertainty by both risk and consistency terms;\n- when\
    \ multiple routes are close, abstention is preferred over forced commitment.\n\
    \nThe calibrated joint distribution is\n\n$$\np(a,z\\mid x,c,K)=\\frac{\\exp\\\
    left(U(a,z)/T\\right)}{\\sum_{(a',z')\\in\\Omega_f(x,c,K)}\\exp\\left(U(a',z')/T\\\
    right)}\n$$\n\nwith temperature \\\\(T=1.7\\\\). The system does not always force\
    \ a route. Instead, it abstains when\n\n$$\n\\max_{(a,z)} p(a,z\\mid x,c,K) <\
    \ \\tau \\quad \\text{or} \\quad p_{(1)}-p_{(2)}<\\delta\n$$\n\nwhere \\\\(\\\
    tau=0.58\\\\) is the top-confidence threshold and \\\\(\\delta=0.09\\\\) is the\
    \ minimum top-two probability margin. Abstention triggers clarification, conservative\
    \ fallback, or read-only explanation rather than high-risk actuation. This reflects\
    \ an important position of the paper: **conservative behavior under uncertainty\
    \ is part of trustworthy autonomous operations, not evidence of system weakness.**\n\
    \n### 5.5 AI-Augmented Fault-Tree Analysis\n\nRather than replacing fault trees\
    \ with LLMs, we preserve the structural causal advantages of FTA while introducing\
    \ `skill`, `rag`, and `llm` evaluators at leaf nodes. This yields four benefits:\n\
    \n- **symbolic structure preserves causal auditability**;\n- **AI evaluators improve\
    \ flexibility of evidence access**;\n- **the tree structure makes the diagnostic\
    \ path explainable and reviewable**;\n- **structured gates give multi-source evidence\
    \ a compositional semantics that can be computed**.\n\nFor a gate node \\\\(g\\\
    \\) with children \\\\(v_1,\\dots,v_m\\\\), typical gate evaluation is\n\n$$\n\
    P(g_{\\mathrm{AND}})=\\prod_{i=1}^{m} P(v_i)\n$$\n\n$$\nP(g_{\\mathrm{OR}})=1-\\\
    prod_{i=1}^{m}\\left(1-P(v_i)\\right)\n$$\n\nFor a `k-of-n` voting gate,\n\n$$\n\
    P(g_{k/n})=\\sum_{A\\subseteq [n],\\ |A|\\ge k}\\prod_{i\\in A}P(v_i)\\prod_{j\\\
    notin A}(1-P(v_j))\n$$\n\nwhere \\\\(P(v_i)\\\\) can come not only from static\
    \ rules, but also from retrieved evidence, live skill observations, or LLM interpretations\
    \ of semi-structured logs. In this way, classical FTA gains stronger evidence-consumption\
    \ ability, while modern AI reasoning remains constrained inside an auditable causal\
    \ scaffold.\n\n### 5.6 Permission-Bounded Skill Execution Substrate\n\nEach skill\
    \ declares in its `manifest`:\n\n- permission scope;\n- resource budget;\n- side-effect\
    \ class;\n- timeout limit;\n- input-parameter constraints;\n- allowed network\
    \ and file-system access scope;\n- execution environment and dependency conditions.\n\
    \nAt runtime, the system enforces:\n\n- host and path allowlists;\n- `CPU` and\
    \ memory quotas;\n- isolated execution environments;\n- parameter-level policy\
    \ validation;\n- timeout termination;\n- audit logging.\n\nHence, “tool use” in\
    \ this paper does not mean allowing the model to freely execute arbitrary external\
    \ actions. It means invoking bounded capabilities inside a declarative, constrained,\
    \ and auditable governance framework. This directly distinguishes ResolveAgent\
    \ from many general agent frameworks that effectively allow a tool whenever the\
    \ model “wants” to call it.\n\n### 5.7 Single Source of Truth Control Plane and\
    \ Dynamic Synchronization\n\nIn real production systems, many failures come not\
    \ from incorrect model reasoning, but from **inconsistent capability metadata**:\
    \ a skill exists in the registry but not in the runtime; a route is exposed at\
    \ the gateway but unsupported by the executor; a workflow has been updated but\
    \ the cached snapshot is stale. ResolveAgent therefore uses a Single Source of\
    \ Truth control plane to manage:\n\n- the skill registry;\n- the workflow registry;\n\
    - agents and model routes;\n- permission policy;\n- gateway exposure configuration;\n\
    - runtime capability snapshots.\n\nMore concretely, the current system already\
    \ includes mechanisms that directly support the paper’s claims:\n\n1. a **unified\
    \ registry service** as the single query source for agents, skills, workflows,\
    \ and model routes;\n2. a **dynamic route synchronizer** that automatically exposes\
    \ available agents and skills to the gateway layer;\n3. a **model router** that\
    \ centralizes provider selection, rate limiting, fallback, request rewriting,\
    \ and unified path management in `Higress`;\n4. **authentication and role middleware**\
    \ that inject unified identity context from gateway, JWT, and API key into execution\
    \ decisions;\n5. a **runtime registry client** that fetches capability snapshots\
    \ on demand so the selector can read current state.\n\nThe goal is not just to\
    \ build a cleaner architecture, but to make control-plane consistency a measurable\
    \ and governable systems property. The stability and governance experiments in\
    \ this paper directly validate this point.\n\n### 5.8 Observability, Feedback\
    \ Loops, and Online Recalibration\n\nA conference-level autonomous operations\
    \ system should not only make decisions, but also explain, log, and reassess them.\
    \ ResolveAgent therefore includes structured logs, route rationales, skill latencies,\
    \ evidence coverage, configuration-propagation delay, and policy-interception\
    \ outcomes in a unified observation surface. While our main experiments remain\
    \ offline, the design explicitly supports online feedback signals including:\n\
    \n- routing correctness and human override records;\n- skill success rate and\
    \ timeout rate;\n- target-instance freshness and propagation delay;\n- route flip\
    \ rate, abstention rate, and selective risk;\n- unauthorized-call interceptions\
    \ and privilege-escalation attempts.\n\nResolveAgent is thus not merely an offline-trained\
    \ classifier. It is a system prototype that can evolve through a closed loop of\
    \ calibration, deployment, observation, and recalibration.\n\n---\n\n## 6. Theoretical\
    \ Analysis and Verifiable Propositions\n\nTo show that the design is not an empirical\
    \ patchwork, we provide four verifiable propositions and validate their empirical\
    \ consequences in Section 8.\n\n### 6.1 Proposition 1: Feasibility Pruning Upper-Bounds\
    \ Unsafe Exposure\n\n**Proposition 1.** Let \\\\(\\Omega_u(x,c,K)\\\\) denote\
    \ the set of unsafe joint actions under the current request. If the safety discriminator\
    \ has false-negative rate \\\\(\\epsilon_p\\\\) over unsafe actions, then the\
    \ post-pruning policy satisfies\n\n$$\n\\Pr\\left((a,z)\\in\\Omega_u\\mid x,c,K\\\
    right)\\le \\epsilon_p\n$$\n\nwhich degenerates to 0 when the safety discriminator\
    \ makes no false-negative errors.\n\n**Proof sketch.** Feasibility pruning removes\
    \ all actions recognized as unsafe by policy. Therefore, any unsafe action that\
    \ survives must belong to the discriminator’s false-negative set. The surviving\
    \ unsafe probability mass is thus upper-bounded by the false-negative rate. The\
    \ proposition formalizes that safety governance is not a post-routing patch, but\
    \ a prior constraint on the candidate space.\n\n### 6.2 Proposition 2: Regret\
    \ Decomposition of Hierarchical Decisions\n\nLet the optimal joint action be \\\
    \\((a^\\star,z^\\star)\\\\) and the model’s choice be \\\\((\\hat a,\\hat z)\\\
    \\). Define joint regret as\n\n$$\n\\mathcal{R}(x)=U(a^\\star,z^\\star)-U(\\hat\
    \ a,\\hat z)\n$$\n\nThen the following upper bound holds:\n\n$$\n\\mathcal{R}(x)\\\
    le \\mathcal{R}_{\\mathrm{route}}(x)+\\mu\\,\\mathcal{R}_{\\mathrm{target}}(x)+\\\
    lambda_s\\,\\mathrm{switch}(\\hat a,\\hat z)\n$$\n\nwhere \\\\(\\mathcal{R}_{\\\
    mathrm{route}}\\\\) and \\\\(\\mathcal{R}_{\\mathrm{target}}\\\\) are sub-regrets\
    \ at the execution-substrate level and target level, respectively.\n\n**Interpretation.**\
    \ This decomposition shows that splitting routing into “choose the execution substrate\
    \ first, then choose the target instance” does not destroy the global objective.\
    \ Instead, it provides a finer-grained error-analysis structure. Experimentally,\
    \ we will show that the one-stage `FlatRouter` is substantially weaker than the\
    \ hierarchical model on both route flip rate and target-error rate.\n\n### 6.3\
    \ Proposition 3: Decision Stability under Consistency-Aware Regularization\n\n\
    Assume the joint utility function \\\\(U(a,z)\\\\) is \\\\(L\\\\)-Lipschitz with\
    \ respect to control-plane perturbation, i.e., for any \\\\(\\|\\tilde K-K\\|\\\
    le \\epsilon\\\\),\n\n$$\n|U(a,z\\mid \\tilde K)-U(a,z\\mid K)|\\le L\\epsilon\n\
    $$\n\nLet the utility gap between the best and second-best joint candidates be\n\
    \n$$\n\\gamma(x)=U(a_1,z_1)-U(a_2,z_2)\n$$\n\nIf \\\\(\\gamma(x)>2L\\epsilon\\\
    \\), then the optimal joint decision does not flip under perturbation \\\\(\\\
    tilde K\\\\).\n\n**Proof sketch.** The best and second-best candidates can each\
    \ change by at most \\\\(L\\epsilon\\\\), so their gap can shrink by at most \\\
    \\(2L\\epsilon\\\\). If the original gap is larger than that quantity, the ranking\
    \ is preserved. This proposition provides the theoretical motivation for consistency-aware\
    \ regularization: by enlarging the gap between safe and unstable candidates, it\
    \ lowers the probability of decision flips caused by control-plane drift.\n\n\
    ### 6.4 Proposition 4: Positive-Gain Condition for Bounded `Multi`\n\nLet the\
    \ primary route be \\\\(a\\\\) and the candidate supplementary route be \\\\(b\\\
    \\). If\n\n$$\n\\lambda_q\\,\\Delta Q_{b\\mid a}>\\lambda_l\\,\\Delta L_{b\\mid\
    \ a}+\\lambda_c\\,\\Delta C_{b\\mid a}+\\lambda_r\\,\\Delta R_{b\\mid a}\n$$\n\
    \nthen the two-stage composition \\\\(a\\rightarrow b\\\\) has higher expected\
    \ joint utility than executing \\\\(a\\\\) alone.\n\n**Interpretation.** This\
    \ theorem formalizes our position on `Multi`: multi-route execution is justified\
    \ only when the value of supplementary evidence exceeds its additional latency,\
    \ cost, and risk. It prevents the “try more steps just in case” behavior common\
    \ in open-ended agent loops.\n\n### 6.5 Mapping Propositions to Experimental Hypotheses\n\
    \nThe propositions motivate the following empirical hypotheses:\n\n- **H1:** hierarchical\
    \ decision making outperforms a one-stage joint classifier;\n- **H2:** consistency-aware\
    \ regularization significantly reduces route flip rate under control-plane perturbations;\n\
    - **H3:** bounded `Multi` improves difficult incidents without causing uncontrollable\
    \ latency inflation;\n- **H4:** feasibility pruning and abstention reduce the\
    \ probability that unsafe actions reach the execution layer.\n\nThese hypotheses\
    \ are validated in Section 8 through ablations, robustness stress tests, and governance\
    \ experiments.\n\n---\n\n## 7. Experimental Methodology\n\n### 7.1 Research Questions\n\
    \nWe evaluate six research questions:\n\n- **RQ1:** Does hybrid routing outperform\
    \ manual workflows, rule-based routing, LLM-only routing, and general agent baselines?\n\
    - **RQ2:** Do structured diagnosis and evidence-driven `Multi` improve end-to-end\
    \ resolution of production incidents?\n- **RQ3:** Which components contribute\
    \ most to performance, calibration quality, and operational safety?\n- **RQ4:**\
    \ Does the system remain robust under capability loss, knowledge drift, adversarial\
    \ phrasing, control-plane delay, and high concurrency?\n- **RQ5:** Do the Single\
    \ Source of Truth design and governance mechanisms materially reduce unsafe actions\
    \ and control-plane inconsistency?\n- **RQ6:** Do hierarchical target/model routing,\
    \ consistency-aware regularization, and the counterfactual stability objective\
    \ yield additional, quantifiable structural gains?\n\n### 7.2 Datasets and Annotation\
    \ Protocol\n\nWe use three datasets:\n\n- **IncidentBench:** 2,847 anonymized\
    \ production incidents spanning 14 cloud-service categories including compute,\
    \ storage, gateway, database, observability, and `CI/CD`;\n- **OpsQA:** 5,000\
    \ operations QA examples derived from `runbooks`, `SOP`s, incident postmortems,\
    \ and knowledge-base articles;\n- **SkillTest:** 500 governed tool-execution cases\
    \ covering 18 read-only or bounded-action skills.\n\n`IncidentBench` is split\
    \ chronologically into train/dev/test to reduce temporal leakage. All text fields\
    \ are de-identified before annotation; service identifiers, hostnames, tenant\
    \ keys, and ticket IDs are replaced with consistent pseudonyms. Three senior `SRE`s\
    \ independently annotate route family, target selection, and first-response quality,\
    \ with adjudication on disagreement cases.\n\n**Table 1. Dataset and annotation\
    \ summary.**\n\n| Dataset | Train | Dev | Test | Labels | Domain focus | Notes\
    \ |\n|---|---:|---:|---:|---|---|---|\n| IncidentBench | 1,708 | 427 | 712 | Route,\
    \ target, FRQ, MTTR | Production incidents | Chronological split |\n| OpsQA |\
    \ 3,000 | 1,000 | 1,000 | Route, target, answer quality | `runbooks` and knowledge\
    \ base | Retrieval-heavy |\n| SkillTest | 300 | 100 | 100 | Tool choice, success,\
    \ safety | Sandbox skills | Execution-heavy |\n\nOn the `IncidentBench` test split,\
    \ the route distribution is 37.2% `FTA`, 27.2% `RAG`, 19.2% `Skill`, 11.5% `Direct-LLM`,\
    \ and 4.9% `Multi`. Annotation agreement is strong: `Cohen's κ` is 0.82 for route\
    \ family, 0.79 for target choice, and 0.76 for `FRQ`.\n\n### 7.3 Baselines, Fairness\
    \ Controls, and Implementation Details\n\nWe compare against seven main baselines:\n\
    \n- `ManualOps`: human triage and human execution;\n- `RuleRouter`: rule-based\
    \ routing;\n- `LLMRouter`: single-step LLM routing;\n- `ReAct-style Agent`: iterative\
    \ thought–action loop;\n- `LangChain Agent`: planner–executor agent;\n- `ResolveAgent-Rule`:\
    \ ResolveAgent with a rule selector;\n- `ResolveAgent-LLM`: learned selector without\
    \ calibration and abstention.\n\nTo validate the structural innovations of this\
    \ paper, we further introduce two structural controls:\n\n- `FlatRouter`: a one-stage\
    \ joint classifier that directly predicts route–target pairs without explicit\
    \ hierarchy;\n- `NoSSOT`: a variant without consistency-aware regularization or\
    \ freshness gating, relying only on cached capability snapshots without explicit\
    \ control-plane-drift penalties.\n\nTo ensure fairness, all automated systems\
    \ share:\n\n- the same instruction-tuned backbone model;\n- the same retrieval\
    \ corpus and `reranker`;\n- the same observability connectors;\n- the same inventory\
    \ of 18 skills;\n- the same output `token` budget;\n- the same maximum of two\
    \ tool invocations;\n- the same `12s` sandbox timeout and `Kubernetes` worker\
    \ types.\n\nAt the implementation level, the evaluated prototype consists of three\
    \ complementary layers: the `Go` control plane for the unified registry, route\
    \ synchronization, model routing, and authentication governance; the `Python`\
    \ runtime for the Intelligent Selector, `FTA`, `RAG`, and skill execution; and\
    \ `Higress` for unified model ingress, rate limiting, fallback, and provider compatibility.\
    \ This layered prototype is tightly aligned with the methodological claims of\
    \ the paper.\n\n### 7.4 Metrics and Statistical Protocol\n\nWe report:\n\n- routing\
    \ accuracy (`RA`);\n- target-selection accuracy (`TA`);\n- route-family `Macro\
    \ F1`;\n- mean time to resolution (`MTTR`);\n- first-response quality (`FRQ`);\n\
    - closure rate (`Closure`);\n- escalation rate (`Escalation`);\n- end-to-end latency\
    \ (`P50/P95`);\n- calibration metrics (`ECE`, `Brier`, `Coverage`, `Selective\
    \ Risk`);\n- governance metrics (unsafe-action blocking rate, policy-consistency\
    \ rate, configuration-propagation delay);\n- **route flip rate (`RFR`)**: the\
    \ fraction of cases whose final route changes under injected control-plane perturbation\
    \ relative to the clean condition.\n\nAll results are averaged over five random\
    \ seeds. For `RA`, `TA`, and other accuracy-like metrics, we report 95% confidence\
    \ intervals from 1,000 paired `bootstrap` resamples. For `MTTR`, we use a two-sided\
    \ `Wilcoxon signed-rank` test due to right-skewed distributions. `RFR` is estimated\
    \ on a fixed test set by injecting 1–5 second registry-propagation lag, state\
    \ flips, and target-instance failures.\n\n### 7.5 Real-World Scenario Design\n\
    \nBeyond standard benchmarks, we evaluate six scenario families that align with\
    \ the current code and demo assets:\n\n1. online database-latency and 5xx triage;\n\
    2. canary-release anomalies and feature-flag drift;\n3. authentication failures\
    \ after secret rotation;\n4. alert-threshold drift during policy migration;\n\
    5. `runbook` / `SOP`-driven operational QA;\n6. safety review of permission-bounded\
    \ tool requests.\n\nThese scenarios directly cover the current repository’s demonstration\
    \ workflows, `runbook` assets, log-analysis skills, metric-inspection skills,\
    \ knowledge-base examples, and permission-bounded skill manifests, making them\
    \ a realistic evaluation of the system prototype’s value boundary.\n\n---\n\n\
