# ResolveNet Platform Services Configuration

server:
  http_addr: ":8080"
  grpc_addr: ":9090"

database:
  host: localhost
  port: 5432
  user: resolvenet
  password: resolvenet
  dbname: resolvenet
  sslmode: disable

redis:
  addr: "localhost:6379"
  db: 0

nats:
  url: "nats://localhost:4222"

runtime:
  grpc_addr: "localhost:9091"

gateway:
  admin_url: "http://localhost:8888"
  enabled: false

telemetry:
  enabled: false
  otlp_endpoint: "localhost:4317"
  service_name: "resolvenet-platform"
  metrics_enabled: true
