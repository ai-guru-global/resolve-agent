  source: 结果表明，运维系统的优劣不能只看平均场景。在能力不完整、知识质量下降或输入对抗性增强时，选择性路由、可行性裁剪和一致性感知正则显著降低了系统脆弱性。特别值得注意的是，即便在注入式注册表延迟场景中，完整系统仍保持
    84.9% 的 `RA` 和 14.9% 的 `RFR`，明显优于无一致性正则的对照模型。
  target: The results show that autonomous operations systems cannot be judged only
    on average cases. Under incomplete capability, lower knowledge quality, or more
    adversarial inputs, selective routing, feasibility pruning, and consistency-aware
    regularization materially reduce system fragility. In particular, even under injected
    registry lag, the full system still preserves 84.9% `RA` and 14.9% `RFR`, clearly
    outperforming the counterpart without consistency-aware regularization.
