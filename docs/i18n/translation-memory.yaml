  target: '`IncidentBench` is split chronologically into train/dev/test to reduce
    temporal leakage. All text fields are de-identified before annotation; service
    identifiers, hostnames, tenant keys, and ticket IDs are replaced with consistent
    pseudonyms. Three senior `SRE`s independently annotate route family, target selection,
    and first-response quality, with adjudication on disagreement cases.'
