  source: 本文报告了 `bootstrap` 置信区间、多随机种子和成对检验，但路由策略空间仍然很大。当前开发集上最优的阈值和权重，未必在长期漂移后依然最优。尤其是一致性感知正则的最优强度可能随组织、团队和部署环境而显著变化，因此未来仍需评估更长时间尺度上的非平稳性、自适应重校准以及多组织迁移稳定性。
  target: We report `bootstrap` confidence intervals, multiple random seeds, and paired
    tests, but the routing-policy space remains large. Thresholds and weights that
    are optimal on the current development set may not remain optimal under long-term
    drift. In particular, the best strength of consistency-aware regularization may
    vary substantially across organizations, teams, and deployment environments. Future
    work should therefore examine longer-horizon non-stationarity, adaptive recalibration,
    and multi-organization transfer stability.
