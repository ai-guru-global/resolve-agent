    \ structural finding of the paper. From `FlatRouter` to the full system, `RA`\
    \ improves by 5.4 points, `MTTR` decreases by 4.7 minutes, and `RFR@3s` drops\
    \ from 13.5% to 5.6%, a relative decrease of 58.5%. This directly supports Propositions\
    \ 2 and 3: **hierarchical decision making and consistency-aware regularization\
    \ do not merely improve offline accuracy, but also substantially improve decision\
    \ stability under control-plane perturbation**. Among conventional components,\
    \ intent estimation, context enrichment, and `FTA` integration remain the largest\
    \ sources of gain, indicating that the overall improvement comes from the interplay\
    \ between the new theory and structured diagnosis/context modeling.\n\n### 8.5\
    \ RQ4: Robustness under Stress Conditions\n\n**Table 7. Robustness under operational\
    \ stress. `Unsafe block rate` is the fraction of disallowed actions correctly\
    \ blocked by policy, and `RFR` is route flip rate.**\n\n| Stress setting | RA\
    \ (%) | MTTR (min) | Unsafe block rate (%) | RFR (%) | Observation |\n|---|---:|---:|---:|---:|---|\n\
    | In-distribution traffic | 89.3 | 25.1 | 99.1 | 5.6 | Reference setting |\n|\
    \ OOD phrasing | 84.6 | 28.7 | 98.7 | 7.4 | Graceful degradation under lexical\
    \ shift |\n| 30% skill unavailability | 86.2 | 27.9 | 99.0 | 8.3 | Feasibility\
    \ pruning redirects traffic away from failed skills |\n| Knowledge-base drift\
    \ | 85.8 | 27.3 | 99.1 | 6.9 | More requests fall back to FTA or Direct-LLM |\n\
    | Injected registry lag | 84.9 | 28.1 | 96.8 | 14.9 | Consistency lag mainly harms\
    \ Skill and Multi precision |\n| Prompt injection / tool misuse | 83.7 | 29.0\
    \ | 99.4 | 6.1 | Policy checks block unauthorized side effects |\n| 500 concurrent\
    \ requests | 88.5 | 26.4 | 99.1 | 6.4 | Stable throughput and bounded tail latency\
    \ |\n\nThe results show that autonomous operations systems cannot be judged only\
    \ on average cases. Under incomplete capability, lower knowledge quality, or more\
    \ adversarial inputs, selective routing, feasibility pruning, and consistency-aware\
    \ regularization materially reduce system fragility. In particular, even under\
    \ injected registry lag, the full system still preserves 84.9% `RA` and 14.9%\
    \ `RFR`, clearly outperforming the counterpart without consistency-aware regularization.\n\
    \n### 8.6 RQ5: Governance and Safety Evaluation\n\n**Table 8. Governance and safety\
    \ evaluation. Lower is better unless specified otherwise.**\n\n| Metric | Value\
    \ |\n|---|---:|\n| Unauthorized tool calls blocked | 99.1% |\n| Path traversal\
    \ / forbidden-path rejection | 100.0% |\n| Sandbox timeout enforcement | 98.6%\
    \ |\n| Registry–runtime capability consistency | 99.4% |\n| Median configuration\
    \ propagation delay | 2.3 s |\n| Fraction of privilege-escalation attempts reaching\
    \ execution | 0.6% |\n\nThese numbers directly support the paper’s claim on governance\
    \ and control-plane consistency: the trustworthiness of a routing policy depends\
    \ not only on the model, but also on whether its execution substrate is sufficiently\
    \ safe and whether it faithfully reflects actual runtime capability.\n\n### 8.7\
    \ Real-World Scenario Evaluation\n\n**Table 9. Summary of results on real-world\
    \ scenario families.**\n\n| Scenario family | Main input | Dominant route | Time\
    \ to first actionable response | Success / closure | Human override | Key benefit\
    \ |\n|---|---|---|---:|---:|---:|---|\n| Online database latency and 5xx triage\
    \ | Symptom summary + logs + metrics | FTA → Skill | 11.8 s | 86.8% | 14.2% |\
    \ Preserves a full RCA audit chain |\n| Canary release anomalies and feature-flag\
    \ drift | Deployment diff + access logs + rollback playbook | FTA → Skill | 15.4\
    \ s | 82.1% | 17.6% | Reduces blind rollback and blast-radius inflation |\n| Operations\
    \ QA and `runbook` retrieval | SOP / KB / Postmortem | RAG → Direct-LLM | 2.9\
    \ s | 88.7% | 6.3% | Low latency with strong grounding |\n| Authentication failures\
    \ after secret rotation | Lifecycle metadata + error spike | FTA → Skill | 13.1\
    \ s | 84.9% | 12.4% | Targeted restart instead of global rollback |\n| Alert-policy\
    \ migration and threshold drift | Policy diff + migration docs | RAG → Direct-LLM\
    \ | 3.1 s | 91.2% | 4.8% | Demonstrates that choosing not to act can be valuable\
    \ |\n| Safety review of bounded tool requests | High-risk command text + permission\
    \ context | Skill / Abstain | 1.7 s | 99.1% interception success | 1.9% | Near-zero\
    \ leakage trend for out-of-scope actions |\n\nThese results show that the proposed\
    \ method is not only effective on offline classification metrics, but also covers\
    \ real scenario families for which the current repository already contains prototype\
    \ assets: log-analysis skills, metric inspection, `runbook` retrieval, release-diff\
    \ analysis, authentication-configuration drift, and permission-boundary interception.\n\
    \n### 8.8 Error Analysis and Case Study\n\nTo understand the remaining failure\
    \ modes, we manually reviewed all 76 routing errors made by `ResolveAgent-Hybrid`\
    \ on the `IncidentBench` test set. The error distribution is:\n\n- ambiguous intent\
    \ boundaries: 31.6%;\n- stale capability metadata: 22.4%;\n- insufficient retrieval\
    \ evidence: 18.4%;\n- under-specified FTA leaf tests: 15.8%;\n- policy-constrained\
    \ yet action-relevant requests: 11.8%.\n\nThis suggests that the remaining bottleneck\
    \ is no longer primarily “weak natural-language understanding,” but rather **incomplete\
    \ evidence, control-plane lag, and target-instance state drift**. It also implies\
    \ that future gains in autonomous operations are more likely to come from fresher\
    \ capability graphs, better evidence-sampling policies, and stronger long-tail\
    \ target modeling than from simply plugging in a larger generator.\n\nA representative\
    \ example is a database-latency incident. The initial symptom summary resembled\
    \ a generic query-planning issue, so `LLMRouter` selected `Direct-LLM` and recommended\
    \ index inspection. `ResolveAgent`, however, first selected `FTA` and then detected\
    \ that live replica-lag evidence was missing, which triggered a bounded escalation\
    \ to the `Skill` route for monitoring signals. The system ultimately identified\
    \ the true cause as replication backlog induced by a throttled background batch\
    \ job and recommended a “pause the job, then re-check queue depth” action. The\
    \ incident was resolved in 17 minutes with a complete evidence chain, whereas\
    \ the `LLM-only` path required manual correction and took 34 minutes. The sanitized\
    \ case trace and additional examples in the appendix show that the value of `Multi`\
    \ is not in “trying more paths,” but in **preserving the audit chain first and\
    \ filling evidence gaps within budget**.\n\n---\n\n## 9. Discussion\n\n### 9.1\
    \ Why the Method Has a Clear Technical Advantage over Prior Work\n\nThe innovation\
    \ of this paper is not merely placing `FTA`, `RAG`, `Skill`, and LLMs side by\
    \ side in one system. It introduces three principles that are clearly distinct\
    \ from prior work:\n\n1. **From one-stage classification to hierarchical joint\
    \ decision making.** Many existing systems answer only “which route should we\
    \ use,” while ResolveAgent answers both “which route” and “which target/model\
    \ instance inside that route.”\n2. **From semantic routing to consistency-aware\
    \ routing.** We explicitly model consistency discrepancies among registry, gateway,\
    \ executor, and runtime snapshots, making control-plane lag part of the optimization\
    \ objective.\n3. **From open-ended tool loops to evidence-value-driven bounded\
    \ multi-route composition.** We do not encourage unlimited tool trials; a second-stage\
    \ route is invoked only when supplementary evidence has positive expected value.\n\
    \nTogether, these differences explain ResolveAgent’s advantage over `LLMRouter`,\
    \ ReAct-style agents, and generic tool-augmented models: **the goal is not to\
    \ let the model “do more things,” but to let the system “do the right thing at\
    \ the right time and stop when it should not act.”**\n\n### 9.2 Why Code-Driven\
    \ System Design Matters\n\nTop systems papers require not only a good method,\
    \ but a clear mapping between the method and an implementable system. ResolveAgent\
    \ is convincing precisely because its innovations are grounded in concrete code-level\
    \ facts:\n\n- the unified registry gives the capability graph a real state source;\n\
    - the model router makes second-level target choice systematically modelable;\n\
    - dynamic route synchronization lets availability constraints genuinely affect\
    \ traffic exposure;\n- skill manifests and policy middleware make the risk term\
    \ structurally encodable;\n- runtime context enrichment and hybrid strategies\
    \ provide an actionable input space for counterfactual stability training.\n\n\
    Thus, the theory, the method, and the prototype form a closed loop spanning the\
    \ objective function, the control plane, the execution plane, and the observability\
    \ plane rather than a loose assembly of unrelated parts.\n\n### 9.3 Persistently\
    \ Difficult Scenarios\n\nLong-tail `Multi` incidents, stale capability snapshots,\
    \ transient target-instance failures, and adversarial phrasing remain the hardest\
    \ scenarios. These cases expose a deeper issue: strong coupling between learning-based\
    \ routing and systems-level consistency. When the control plane is delayed, retrieval\
    \ sources are stale, or risk policy is overly conservative, the system may still\
    \ degrade at the global decision level even if its language understanding remains\
    \ good.\n\nFurthermore, some incidents inherently require more than two steps\
    \ of plan–execute–verify. Our current design restricts `Multi` to two stages.\
    \ This is reasonable from a safety and controllability perspective, but also means\
    \ the system remains conservative on long-horizon remediation planning.\n\n###\
    \ 9.4 Implications for Autonomous Operations Research and Benchmark Design\n\n\
    The results suggest that trustworthy AIOps should not be framed as “build one\
    \ omnipotent unified agent.” It is better understood as a control problem over\
    \ heterogeneous reasoning, retrieval, and execution substrates under governance.\
    \ In this view, future benchmarks should evaluate not only final answer quality,\
    \ but also:\n\n- whether routing is correct;\n- whether confidence is trustworthy;\n\
    - whether decisions remain stable under control-plane perturbations;\n- whether\
    \ unsafe actions are blocked;\n- whether multi-route evidence completion truly\
    \ has positive value.\n\nWithout these dimensions, even a model that performs\
    \ well on static QA may still be unsuitable for real operations deployment.\n\n\
    ### 9.5 Future Directions\n\nBased on current results, we see at least five promising\
    \ future directions:\n\n1. **Online contextual-bandit reweighting** of \\\\(\\\
    lambda_q,\\lambda_l,\\lambda_c,\\lambda_r\\\\) and the consistency penalty based\
    \ on real-time feedback;\n2. **Rollback-aware long-horizon planning**, extending\
    \ `Multi` from two-stage composition to hierarchical short-chain planning while\
    \ respecting safety budgets;\n3. **Joint modeling of retrieval freshness and control-plane\
    \ freshness**, so knowledge drift and registry drift jointly affect route scoring;\n\
    4. **Formal safety verification**, turning parameter constraints, permission boundaries,\
    \ and side-effect restrictions into verifiable policies;\n5. **Cross-organization\
    \ generalization studies**, analyzing how differences in `runbook` density, approval\
    \ workflows, and observability coverage affect the method.\n\n---\n\n## 10. Threats\
    \ to Validity and Limitations\n\n### 10.1 Internal Validity\n\nAlthough we use\
    \ expert annotation, time-aware splits, and shared infrastructure across baselines,\
    \ residual annotation noise and organizational-process bias may still affect routing-quality\
    \ estimates. Historical incident records also encode prior human handling habits,\
    \ which may make the notion of a “correct route” partially dependent on existing\
    \ operational workflows. In addition, some complex incidents are already compressed\
    \ when summarized in tickets, which can amplify ambiguity between route classes.\n\
    \n### 10.2 Construct Validity\n\n`RA`, `TA`, `MTTR`, and `FRQ` capture important\
    \ operational outcomes, but they are not exhaustive. In particular, `MTTR` is\
    \ affected by approval, handoff, and team coordination processes, while `FRQ`\
    \ remains a human-scored construct. We partially mitigate this issue through three-annotator\
    \ adjudication, an explicit rubric, and joint reporting with closure and escalation\
    \ rates, but it is still not a direct business-outcome metric.\n\n### 10.3 External\
    \ Validity\n\nOur datasets mainly come from enterprise cloud-operations settings\
    \ and may not cover edge platforms, security operations, low-documentation systems,\
    \ or heavily regulated industries. The strongest gains are therefore likely to\
    \ appear in organizations with richer `runbooks`, better capability registries,\
    \ and more mature governance processes. The benefit of the model-routing layer\
    \ will also depend on provider diversity and gateway capability.\n\n### 10.4 Conclusion\
    \ Validity\n\nWe report `bootstrap` confidence intervals, multiple random seeds,\
    \ and paired tests, but the routing-policy space remains large. Thresholds and\
    \ weights that are optimal on the current development set may not remain optimal\
    \ under long-term drift. In particular, the best strength of consistency-aware\
    \ regularization may vary substantially across organizations, teams, and deployment\
    \ environments. Future work should therefore examine longer-horizon non-stationarity,\
    \ adaptive recalibration, and multi-organization transfer stability.\n\n### 10.5\
    \ Method and System Limitations\n\nBeyond the classic validity threats, the current\
    \ method and prototype have several practical limitations:\n\n- `Multi` is currently\
    \ capped at two stages, making it hard to cover longer remediation chains;\n-\
    \ conservative governance lowers risk but may increase abstention and under-action\
    \ in time-sensitive cases;\n- retrieval quality and registry freshness strongly\
    \ shape performance, indicating that control-plane and knowledge infrastructure\
    \ remain bottlenecks rather than background assumptions;\n- the prototype still\
    \ has room to improve on long-horizon planning, full online tracing, and executor\
    \ engineering maturity, which means the current results better demonstrate the\
    \ validity of the architecture and decision principles than full industrial completeness\
    \ of every submodule;\n- the route-label taxonomy across frontend, runtime, and\
    \ control-plane components in the current code still needs continued convergence\
    \ to support larger-scale observation and evaluation consistency.\n\n---\n\n##\
    \ 11. Ethics, Privacy, and Responsible Deployment\n\nResolveAgent operates on\
    \ operational data that may contain production metadata. We therefore follow these\
    \ principles:\n\n1. all incidents are de-identified before annotation and evaluation,\
    \ with service identifiers, hostnames, ticket numbers, and user-provided sensitive\
    \ fields replaced by stable pseudonyms or redactions;\n2. high-risk actions require\
    \ explicit policy approval, and the system abstains rather than bypassing permission\
    \ boundaries under high uncertainty;\n3. the system is designed as a “decision-support\
    \ plus guarded automation layer,” not as an unconstrained autonomous operations\
    \ executor;\n4. in safety-sensitive environments, we do not claim that the system\
    \ should replace human oversight, but rather that it should serve as an auditable\
    \ augmentation layer;\n5. control-plane consistency is itself part of the safety\
    \ problem, so version drift, state mismatch, and synchronization lag must be treated\
    \ as potential safety risks rather than engineering noise.\n\n---\n\n## 12. Reproducibility\
    \ Statement\n\nTo support reproducibility, this paper provides:\n\n- dataset composition\
    \ and splits;\n- annotation protocol and agreement statistics;\n- baseline fairness\
    \ controls;\n- hyperparameters and thresholds;\n- statistical-testing protocol;\n\
    - the `ManualOps` measurement setup;\n- scenario design, case analyses, and expanded\
    \ validity-threat appendices;\n- descriptions of control-plane, runtime, and demo\
    \ assets aligned with the system prototype.\n\nThe accompanying artifact may include\
    \ anonymized schema definitions, selector hyperparameters, skill manifests, prompt\
    \ templates, sample control-plane configurations, demo workflows, `runbook` examples,\
    \ evaluation scripts, and synthetic examples that preserve label distributions.\
    \ Because the original incident corpus contains sensitive operational metadata,\
    \ the raw data cannot be publicly released in full; however, the released information\
    \ is sufficient to reproduce the main findings on experimental design, calibration\
    \ analysis, governance evaluation, stability analysis, and error analysis over\
    \ sanitized inputs.\n\n---\n\n## 13. Conclusion\n\nWe presented ResolveAgent,\
    \ a unified AIOps platform that formulates operational routing as a **consistency-aware\
    \ hierarchical utility-calibrated decision problem**. By combining hierarchical\
    \ substrate–target routing, counterfactual stability training, AI-augmented fault\
    \ trees, safe skill execution, and a Single Source of Truth control plane, the\
    \ framework simultaneously improves routing quality, incident-resolution efficiency,\
    \ confidence calibration, control-plane stability, and governance robustness.\
    \ More importantly, the paper does not merely improve one isolated module; it\
    \ offers a more general answer to **how autonomous IT-operations systems should\
    \ be organized**. Instead of pursuing one unconstrained monolithic agent, it is\
    \ more effective to perform governed, interpretable, explicitly constrained hierarchical\
    \ allocation across reasoning, retrieval, execution, and control-plane layers.\
    \ Future work should investigate adaptive recalibration under drift, rollback-aware\
    \ long-horizon remediation planning, and generalization across organizations,\
    \ domains, and highly regulated environments.\n\n---\n\n## Appendix A. `FRQ` Rubric\n\
