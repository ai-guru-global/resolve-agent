  source: 从生产事件视角看，`ResolveAgent-Hybrid` 将 `MTTR` 从 47.4 分钟降至 25.1 分钟，对应 47% 的降低，同时还能显著提高关闭率并降低升级率。这里最重要的观察不是“系统自动化更多”，而是：系统能把高风险和高不确定性案例更稳定地送往证据更充分或更保守的处理路径。
  target: From the production-incident perspective, `ResolveAgent-Hybrid` reduces
    `MTTR` from 47.4 minutes to 25.1 minutes, a 47% reduction, while significantly
    increasing closure rate and reducing escalation rate. The most important observation
    is not that the system “automates more,” but that it more reliably sends high-risk
    and high-uncertainty cases to evidence-richer or more conservative handling paths.
