  source: 所有结果在五次不同随机种子下取平均。对 `RA` 和 `TA` 等准确率指标，使用 1,000 次成对 `bootstrap` 估计 95% 置信区间；对
    `MTTR` 使用双侧 `Wilcoxon signed-rank` 检验，因为其分布右偏。`RFR` 则在固定测试集上通过注入 1–5 秒的注册表传播延迟、状态翻转和目标实例失效模拟来估计。
  target: All results are averaged over five random seeds. For `RA`, `TA`, and other
    accuracy-like metrics, we report 95% confidence intervals from 1,000 paired `bootstrap`
    resamples. For `MTTR`, we use a two-sided `Wilcoxon signed-rank` test due to right-skewed
    distributions. `RFR` is estimated on a fixed test set by injecting 1–5 second
    registry-propagation lag, state flips, and target-instance failures.
