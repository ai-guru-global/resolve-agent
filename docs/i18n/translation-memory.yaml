    | 输出预算 | 768 | 生成输出 `token` 上限 |\n\n## 附录 E. 统计检验协议\n\n对 `RA`、`TA` 等准确率指标，本文对每个测试样本计算成对差值，并使用\
    \ 1,000 次成对 `bootstrap` 重采样估计 95% 置信区间。当置信区间不跨 0 且 `bootstrap p-value < 0.05`\
    \ 时，认为差异显著。对 `MTTR`，由于其分布右偏，本文使用双侧 `Wilcoxon signed-rank` 检验。五个随机种子主要用于打乱提示顺序和检索并列项，置信区间始终在固定测试集上计算。`RFR`\
    \ 的估计则基于固定样本上的注入式扰动对比。\n\n## 附录 F. `ManualOps` 评测协议\n\n人工基线由 12 位值班 `SRE` 组成，其平均生产运维经验为\
    \ 5.8 年。人工操作者接收与自动化系统相同的事件摘要、可观测性字段、`runbook` 访问权限和控制台权限，但看不到任何自动化路由结果或解释。`MTTR`\
    \ 从首次接触事件到做出首次正确修复决策为止；若操作员升级事件，则升级时间计入 `MTTR`。\n\n## 附录 G. 净化案例轨迹\n\n**表 13.\
    \ 数据库延迟事件的净化步骤轨迹。**\n\n| 步骤 | ResolveAgent 动作 | 结果 |\n|---|---|---|\n| 1 | 解析症状摘要，抽取服务、严重级别和延迟实体\
    \ | 候选路线为 FTA、Skill、Direct-LLM |\n| 2 | 在最高效用下选择 FTA 作为主路线 | 初始故障树指向复制与查询规划两个分支\
    \ |\n| 3 | 用检索证据和历史事件评估叶节点 | 查询规划证据仍不充分 |\n| 4 | 检测到实时证据缺失，触发有界 `Multi` 回退到 Skill\
    \ | 从沙箱监控器获取副本延迟指标 |\n| 5 | 基于实时证据重新评分并定位为后台任务限流导致的复制积压 | 根因置信度超过决策阈值 |\n| 6 |\
    \ 输出带证据链的建议：“暂停任务后重查队列深度” | 17 分钟内完成解决，并保留完整审计轨迹 |\n\n## 附录 H. 更多净化案例分析\n\n**表\
