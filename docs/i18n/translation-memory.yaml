  source: 总体结果表明，`ResolveAgent-Hybrid` 在自动化方法中取得了最佳的路线准确率、目标选择准确率与 `MTTR`。与 `LLMRouter`
    相比，其 `RA` 提升 6.9 个百分点，`MTTR` 降低 4.3 分钟，差异在统计上显著（\(p<0.01\)）。与通用智能体基线相比，其最大优势不在于“多调用一次工具”，而在于**更早地把请求送入正确的推理/执行基底，并避免在错误机制上浪费预算**。
  target: Overall, `ResolveAgent-Hybrid` achieves the best route accuracy, target-selection
    accuracy, and `MTTR` among automated systems. Compared with `LLMRouter`, it improves
    `RA` by 6.9 points and reduces `MTTR` by 4.3 minutes, both statistically significant
    (\(p<0.01\)). Relative to general agent baselines, its main advantage is not “calling
    one more tool,” but **sending requests earlier to the right reasoning/execution
    substrate and avoiding wasted budget on the wrong mechanism**.
