apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "resolvenet.name" . }}-platform
  labels:
    {{- include "resolvenet.labels" . | nindent 4 }}
    {{- include "resolvenet.platform.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.platform.replicaCount }}
  selector:
    matchLabels:
      {{- include "resolvenet.platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "resolvenet.platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: platform
          image: "{{ .Values.platform.image.repository }}:{{ .Values.platform.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.platform.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.platform.service.httpPort }}
              name: http
            - containerPort: {{ .Values.platform.service.grpcPort }}
              name: grpc
          resources:
            {{- toYaml .Values.platform.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
