    \ 3.1 秒即可给出，`FRQ=5`，表明“选择不动作”同样是安全收益 |\n\n## 附录 I. 扩展效度威胁与局限矩阵\n\n**表 15. 更细粒度的效度威胁与局限矩阵。**\n\
    \n| 类别 | 具体威胁或局限 | 对主张的潜在影响 | 当前缓解措施 | 剩余风险 | 后续改进方向 |\n|---|---|---|---|---|---|\n\
    | 内部效度 | 历史事件记录编码了既有人类分诊习惯 | 可能高估类似现有 `runbook` 的路线，低估新颖但合理的处理策略 | 时间切分、专家仲裁、引入人工基线而非合成金标\
    \ | 中 | 对轮换样本做盲审式反事实重标注 |\n| 内部效度 | 运行时故障期间注册表可能陈旧 | `Skill` 与 `Multi` 的退化可能被误归因于选择器而非控制平面滞后\
    \ | 一致性探针与注入式延迟压力测试 | 中 | 引入基于路由时刻的在线新鲜度验证 |\n| 构念效度 | `FRQ` 是人工评分代理指标而非直接业务收益\
