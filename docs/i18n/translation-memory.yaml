    \ fallback | Medium | Add source-level freshness penalties and incremental indexing\
    \ |\n| Human factors | Operators may change reporting behavior after long-term\
    \ adoption | Input style and escalation patterns may shift later measurements\
    \ | Audit logs and conservative deployment strategy | Medium | Run longitudinal\
    \ field studies before and after deployment |\n| Engineering maturity | Some prototype\
    \ executors and online observability paths are still evolving | System-level claims\
    \ may be stronger than current engineering completeness of some submodules | Report\
    \ contributions around control plane, routing framework, and prototype experiments\
