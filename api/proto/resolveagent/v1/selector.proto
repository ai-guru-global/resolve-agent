syntax = "proto3";

package resolveagent.v1;

option go_package = "github.com/ai-guru-global/resolve-agent/pkg/api/resolveagent/v1;resolveagentv1";

import "resolveagent/v1/agent.proto";
import "google/protobuf/struct.proto";

// SelectorService provides intent classification and routing decisions.
service SelectorService {
  rpc ClassifyIntent(ClassifyIntentRequest) returns (ClassifyIntentResponse);
  rpc Route(RouteRequest) returns (RouteResponse);
}

message ClassifyIntentRequest {
  string input = 1;
  string conversation_id = 2;
  google.protobuf.Struct context = 3;
}

message ClassifyIntentResponse {
  string intent_type = 1;
  float confidence = 2;
  repeated string entities = 3;
  google.protobuf.Struct metadata = 4;
}

message RouteRequest {
  string input = 1;
  string intent_type = 2;
  string agent_id = 3;
  google.protobuf.Struct context = 4;
}

message RouteResponse {
  RouteDecision decision = 1;
  string reasoning = 2;
}
