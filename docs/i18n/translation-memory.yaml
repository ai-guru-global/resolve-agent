    \ `Multi` 预算上限限制长链修复 | 可能错失需要三步以上计划的复杂事件 | 保守预算上限与前置弃权 | 高 | 加入回滚感知的层次化规划 |\n\
    | 方法局限 | 保守治理策略可能提高弃权率 | 在时间敏感事件中可能给出安全但不完整的建议 | 权限清单、审批门和显式弃权分析 | 中 | 支持租户级风险预算与阈值调节\
