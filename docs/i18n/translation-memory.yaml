  target: 且当前 \(E<\eta\) 时，系统才会触发第二条路线。这里 \(\Delta Q_{b\mid a}\) 可被理解为“补充证据后能够带来的质量提升”或“消除关键不确定性带来的决策收益”。这一定义的重要性在于：`Multi`
    不再是一个模糊的“多试几条路”，而是一个**证据价值驱动且预算受限的保守型补偿机制**。
