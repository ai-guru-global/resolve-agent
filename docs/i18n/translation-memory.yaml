  source: 对 `RA`、`TA` 等准确率指标，本文对每个测试样本计算成对差值，并使用 1,000 次成对 `bootstrap` 重采样估计 95% 置信区间。当置信区间不跨
    0 且 `bootstrap p-value < 0.05` 时，认为差异显著。对 `MTTR`，由于其分布右偏，本文使用双侧 `Wilcoxon signed-rank`
    检验。五个随机种子主要用于打乱提示顺序和检索并列项，置信区间始终在固定测试集上计算。`RFR` 的估计则基于固定样本上的注入式扰动对比。
  target: For `RA`, `TA`, and other accuracy metrics, we compute paired differences
    per test instance and estimate 95% confidence intervals using 1,000 paired `bootstrap`
    resamples. When the interval excludes 0 and `bootstrap p-value < 0.05`, the difference
    is considered significant. For `MTTR`, we use a two-sided `Wilcoxon signed-rank`
    test due to right-skew. The five random seeds mainly affect prompt ordering and
    retrieval tie-breaking; confidence intervals are always computed on the fixed
    test set. `RFR` is estimated by comparing perturbed and unperturbed conditions
    on a fixed sample set.
- source_lang: en
  target_lang: zh
