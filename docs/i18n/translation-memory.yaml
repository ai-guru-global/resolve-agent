- source_lang: zh
  target_lang: en
  source: 链式思维提示和零样本推理表明，大语言模型在复杂任务上具有更强的分解与推理能力 [3,4]。`Toolformer` 进一步说明模型可以学习何时调用外部工具
    [5]；检索增强语言模型和基于检索的修正方法则提高了外部知识接入和响应校正能力 [6,7]。`Mallen` 等人的研究显示，参数化记忆与非参数记忆的相对价值强烈依赖任务类型和知识新鲜度
    [8]。这些结果共同表明：检索和工具并非总是有益，它们是否应该被调用、本应调用哪一种工具、何时应该拒绝调用，本身就是一个需要建模的问题。
  target: Chain-of-thought prompting and zero-shot reasoning demonstrate that large
    language models can perform substantially stronger decomposition and reasoning
    on complex tasks [3,4]. `Toolformer` further shows that models can learn when
    to invoke external tools [5]. Retrieval-augmented language models and retrieval-based
    revision methods improve factual grounding and response correction [6,7]. Mallen
    et al. show that the relative value of parametric and non-parametric memory strongly
    depends on task type and knowledge freshness [8]. Collectively, these findings
    suggest that retrieval and tools are not universally helpful; whether they should
    be invoked, which one should be invoked, and when they should be avoided are themselves
    modeling problems.
