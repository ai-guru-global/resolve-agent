  source: 人工基线由 12 位值班 `SRE` 组成，其平均生产运维经验为 5.8 年。人工操作者接收与自动化系统相同的事件摘要、可观测性字段、`runbook`
    访问权限和控制台权限，但看不到任何自动化路由结果或解释。`MTTR` 从首次接触事件到做出首次正确修复决策为止；若操作员升级事件，则升级时间计入 `MTTR`。
  target: The manual baseline consists of 12 on-call `SRE`s with an average of 5.8
    years of production-operations experience. Human operators receive the same incident
    summary, observability fields, `runbook` access, and console permissions as the
    automated systems, but do not see any automated routing output or explanation.
    `MTTR` is measured from first exposure to the incident until the first correct
    remediation decision. If the operator escalates the case, the escalation time
    is counted into `MTTR`.
- source_lang: en
  target_lang: zh
  source: The manual baseline consists of 12 on-call `SRE`s with an average of 5.8
    years of production-operations experience. Human operators receive the same incident
    summary, observability fields, `runbook` access, and console permissions as the
    automated systems, but do not see any automated routing output or explanation.
    `MTTR` is measured from first exposure to the incident until the first correct
    remediation decision. If the operator escalates the case, the escalation time
    is counted into `MTTR`.
  target: 人工基线由 12 位值班 `SRE` 组成，其平均生产运维经验为 5.8 年。人工操作者接收与自动化系统相同的事件摘要、可观测性字段、`runbook`
    访问权限和控制台权限，但看不到任何自动化路由结果或解释。`MTTR` 从首次接触事件到做出首次正确修复决策为止；若操作员升级事件，则升级时间计入 `MTTR`。
