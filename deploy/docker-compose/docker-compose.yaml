version: "3.9"

services:
  platform:
    build:
      context: ../..
      dockerfile: deploy/docker/platform.Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      RESOLVENET_DATABASE_HOST: postgres
      RESOLVENET_REDIS_ADDR: redis:6379
      RESOLVENET_NATS_URL: nats://nats:4222
      RESOLVENET_RUNTIME_GRPC_ADDR: runtime:9091
    depends_on:
      - postgres
      - redis
      - nats

  runtime:
    build:
      context: ../..
      dockerfile: deploy/docker/runtime.Dockerfile
    ports:
      - "9091:9091"
    environment:
      RESOLVENET_RUNTIME_HOST: "0.0.0.0"
      RESOLVENET_RUNTIME_PORT: "9091"

  webui:
    build:
      context: ../..
      dockerfile: deploy/docker/webui.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - platform

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resolvenet
      POSTGRES_PASSWORD: resolvenet
      POSTGRES_DB: resolvenet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--js"]

volumes:
  postgres_data:
