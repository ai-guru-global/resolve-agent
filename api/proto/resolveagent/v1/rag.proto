syntax = "proto3";

package resolveagent.v1;

option go_package = "github.com/ai-guru-global/resolve-agent/pkg/api/resolveagent/v1;resolveagentv1";

import "resolveagent/v1/common.proto";
import "google/protobuf/struct.proto";

// RAGService manages RAG collections and operations.
service RAGService {
  rpc CreateCollection(CreateCollectionRequest) returns (Collection);
  rpc GetCollection(GetCollectionRequest) returns (Collection);
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);
  rpc IngestDocuments(IngestDocumentsRequest) returns (IngestDocumentsResponse);
  rpc QueryCollection(QueryCollectionRequest) returns (QueryCollectionResponse);
}

// RAG Collection
message Collection {
  ResourceMeta meta = 1;
  string embedding_model = 2;
  ChunkConfig chunk_config = 3;
  int64 document_count = 4;
  int64 vector_count = 5;
  ResourceStatus status = 6;
}

message ChunkConfig {
  string strategy = 1; // "fixed", "sentence", "semantic"
  int32 chunk_size = 2;
  int32 chunk_overlap = 3;
}

// Document for ingestion
message Document {
  string id = 1;
  string title = 2;
  string content = 3;
  string content_type = 4; // "text/plain", "text/markdown", "application/pdf"
  map<string, string> metadata = 5;
}

// Retrieved chunk
message RetrievedChunk {
  string document_id = 1;
  string document_title = 2;
  string content = 3;
  float score = 4;
  map<string, string> metadata = 5;
}

// Request/Response messages
message CreateCollectionRequest {
  Collection collection = 1;
}

message GetCollectionRequest {
  string id = 1;
}

message ListCollectionsRequest {
  PaginationRequest pagination = 1;
}

message ListCollectionsResponse {
  repeated Collection collections = 1;
  PaginationResponse pagination = 2;
}

message DeleteCollectionRequest {
  string id = 1;
}

message DeleteCollectionResponse {}

message IngestDocumentsRequest {
  string collection_id = 1;
  repeated Document documents = 2;
}

message IngestDocumentsResponse {
  int64 documents_processed = 1;
  int64 chunks_created = 2;
  repeated string errors = 3;
}

message QueryCollectionRequest {
  string collection_id = 1;
  string query = 2;
  int32 top_k = 3;
  google.protobuf.Struct filters = 4;
}

message QueryCollectionResponse {
  repeated RetrievedChunk chunks = 1;
}
