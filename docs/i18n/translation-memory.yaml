- source_lang: zh
  target_lang: en
  source: 通用智能体框架通常采用“感知—思考—行动”循环，将所有请求置于统一的计划—执行范式中。这类设计在开放环境下具有较强的灵活性，但在自主运维场景中存在三点不足。首先，它们往往缺乏**显式的风险建模**，不能自然区分“错误但可逆的文本生成”和“错误且高代价的外部动作执行”。其次，它们通常将**工具选择**看作提示策略的一部分，而不是一个受平台元数据、权限边界和运行时状态共同约束的系统决策。第三，现有工作很少把**控制平面一致性**纳入研究目标，这导致注册表、网关、执行器和观测组件之间的状态失配容易被忽略。
  target: General agent frameworks typically adopt a “perceive–think–act” loop and
    place all requests into one unified planning–execution paradigm. Such designs
    are flexible in open environments, but they exhibit three important weaknesses
    in autonomous operations. First, they often lack **explicit risk modeling**, and
    therefore do not naturally distinguish between “wrong but reversible text generation”
    and “wrong and high-cost external actuation.” Second, they commonly treat **tool
    choice** as part of prompt strategy rather than as a system decision jointly constrained
    by platform metadata, permission boundaries, and runtime state. Third, prior work
    rarely includes **control-plane consistency** in its research objective, allowing
    state mismatches among registries, gateways, executors, and observability components
    to remain invisible.
