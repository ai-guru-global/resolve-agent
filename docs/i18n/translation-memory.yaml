  source: '`FTA` 在具有稳定因果模板的事件上表现最好，而 `Multi` 仍是最难处理的长尾场景。但与现有多工具智能体不同，本文的 `Multi`
    并不追求遍历式探索，而是在保留结构化审计链的前提下补齐关键信息。因此，即使 `Multi` 类别本身仍然困难，它对复杂事件的终局 `MTTR` 仍有显著贡献。'
  target: '`FTA` performs best on incidents with stable causal templates, while `Multi`
    remains the hardest long-tail category. However, unlike many multi-tool agents,
    the `Multi` path in this paper does not aim at exhaustive exploration. It supplements
    missing information while preserving the structured audit chain. As a result,
    even though the `Multi` class remains difficult, it still contributes significantly
    to final `MTTR` on complex incidents.'
