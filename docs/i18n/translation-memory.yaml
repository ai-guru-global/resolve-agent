  source: AIOps 研究长期关注大规模系统中的异常检测、故障管理、事件理解与自动化支持 [1]。这一类工作建立了“观测—检测—告警—管理”的基础框架，但多数研究仍将“如何在多个执行机制之间分配请求”视为工程细节，而不是显式研究问题。与此相对，面向事件响应的研究强调运维语境、处置手册和可审计工作流的重要性
    [2]，说明运维响应并非简单的自由生成，而需要结构化、可追溯和能与组织流程衔接的诊断逻辑。
  target: AIOps research has long focused on anomaly detection, fault management,
    event understanding, and automation support in large-scale systems [1]. This line
    of work establishes the classic “observe–detect–alert–manage” pipeline, but it
    usually treats the allocation of requests across multiple execution mechanisms
    as an implementation detail rather than an explicit research problem. In contrast,
    incident-response studies emphasize the importance of operational context, response
    playbooks, and auditable workflows [2], suggesting that incident handling is not
    merely free-form generation but requires structured, traceable logic that can
    align with organizational processes.
