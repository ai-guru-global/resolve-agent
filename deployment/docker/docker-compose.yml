# =============================================================================
# ResolveAgent - Production Docker Compose
# =============================================================================
# Complete stack deployment including all application services
# and infrastructure dependencies.
#
# Usage:
#   cp .env.example .env   # Configure environment
#   docker compose up -d   # Start all services
#
# Services:
#   - platform:  Go platform service (HTTP:8080, gRPC:9090)
#   - runtime:   Python agent runtime (gRPC:9091)
#   - webui:     React web dashboard (HTTP:3000 -> Nginx:80)
#   - postgres:  PostgreSQL 16 database
#   - redis:     Redis 7 cache & session store
#   - nats:      NATS JetStream message bus
# =============================================================================

name: resolveagent

services:
  # ===========================================================================
  # Application Services
  # ===========================================================================

  platform:
    build:
      context: ../..
      dockerfile: deployment/docker/platform.Dockerfile
      args:
        VERSION: ${RESOLVEAGENT_VERSION:-dev}
    image: ${DOCKER_REGISTRY:-ghcr.io/ai-guru-global}/resolveagent-platform:${RESOLVEAGENT_VERSION:-latest}
    container_name: resolveagent-platform
    restart: unless-stopped
    ports:
      - "${PLATFORM_HTTP_PORT:-8080}:8080"
      - "${PLATFORM_GRPC_PORT:-9090}:9090"
    environment:
      # Server
      RESOLVEAGENT_SERVER_HTTP_ADDR: ":8080"
      RESOLVEAGENT_SERVER_GRPC_ADDR: ":9090"
      # Database
      RESOLVEAGENT_DATABASE_HOST: ${RESOLVEAGENT_DATABASE_HOST:-postgres}
      RESOLVEAGENT_DATABASE_PORT: ${RESOLVEAGENT_DATABASE_PORT:-5432}
      RESOLVEAGENT_DATABASE_USER: ${RESOLVEAGENT_DATABASE_USER:-resolveagent}
      RESOLVEAGENT_DATABASE_PASSWORD: ${RESOLVEAGENT_DATABASE_PASSWORD:-resolveagent}
      RESOLVEAGENT_DATABASE_DBNAME: ${RESOLVEAGENT_DATABASE_DBNAME:-resolveagent}
      RESOLVEAGENT_DATABASE_SSLMODE: ${RESOLVEAGENT_DATABASE_SSLMODE:-disable}
      # Redis
      RESOLVEAGENT_REDIS_ADDR: ${RESOLVEAGENT_REDIS_ADDR:-redis:6379}
      RESOLVEAGENT_REDIS_PASSWORD: ${RESOLVEAGENT_REDIS_PASSWORD:-}
      RESOLVEAGENT_REDIS_DB: ${RESOLVEAGENT_REDIS_DB:-0}
      # NATS
      RESOLVEAGENT_NATS_URL: ${RESOLVEAGENT_NATS_URL:-nats://nats:4222}
      # Runtime
      RESOLVEAGENT_RUNTIME_GRPC_ADDR: ${RESOLVEAGENT_RUNTIME_GRPC_ADDR:-runtime:9091}
      # Gateway
      RESOLVEAGENT_GATEWAY_ENABLED: ${RESOLVEAGENT_GATEWAY_ENABLED:-false}
      RESOLVEAGENT_GATEWAY_ADMIN_URL: ${RESOLVEAGENT_GATEWAY_ADMIN_URL:-}
      RESOLVEAGENT_GATEWAY_SYNC_INTERVAL: ${RESOLVEAGENT_GATEWAY_SYNC_INTERVAL:-30s}
      RESOLVEAGENT_GATEWAY_MODEL_ROUTING_ENABLED: ${RESOLVEAGENT_GATEWAY_MODEL_ROUTING_ENABLED:-true}
      RESOLVEAGENT_GATEWAY_MODEL_ROUTING_DEFAULT_MODEL: ${RESOLVEAGENT_GATEWAY_MODEL_ROUTING_DEFAULT_MODEL:-qwen-plus}
      RESOLVEAGENT_GATEWAY_AUTH_ENABLED: ${RESOLVEAGENT_GATEWAY_AUTH_ENABLED:-false}
      RESOLVEAGENT_GATEWAY_AUTH_JWT_SECRET: ${RESOLVEAGENT_GATEWAY_AUTH_JWT_SECRET:-}
      RESOLVEAGENT_GATEWAY_LOAD_BALANCER_STRATEGY: ${RESOLVEAGENT_GATEWAY_LOAD_BALANCER_STRATEGY:-round_robin}
      # Telemetry
      RESOLVEAGENT_TELEMETRY_ENABLED: ${RESOLVEAGENT_TELEMETRY_ENABLED:-false}
      RESOLVEAGENT_TELEMETRY_OTLP_ENDPOINT: ${RESOLVEAGENT_TELEMETRY_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  runtime:
    build:
      context: ../..
      dockerfile: deployment/docker/runtime.Dockerfile
    image: ${DOCKER_REGISTRY:-ghcr.io/ai-guru-global}/resolveagent-runtime:${RESOLVEAGENT_VERSION:-latest}
    container_name: resolveagent-runtime
    restart: unless-stopped
    ports:
      - "${RUNTIME_GRPC_PORT:-9091}:9091"
    environment:
      RESOLVEAGENT_RUNTIME_HOST: "0.0.0.0"
      RESOLVEAGENT_RUNTIME_PORT: "9091"
      RESOLVEAGENT_AGENT_POOL_MAX_SIZE: ${RESOLVEAGENT_AGENT_POOL_MAX_SIZE:-100}
      RESOLVEAGENT_SELECTOR_DEFAULT_STRATEGY: ${RESOLVEAGENT_SELECTOR_DEFAULT_STRATEGY:-hybrid}
      RESOLVEAGENT_SELECTOR_CONFIDENCE_THRESHOLD: ${RESOLVEAGENT_SELECTOR_CONFIDENCE_THRESHOLD:-0.7}
      # LLM API Keys
      RESOLVEAGENT_LLM_QWEN_API_KEY: ${RESOLVEAGENT_LLM_QWEN_API_KEY:-}
      RESOLVEAGENT_LLM_WENXIN_API_KEY: ${RESOLVEAGENT_LLM_WENXIN_API_KEY:-}
      RESOLVEAGENT_LLM_ZHIPU_API_KEY: ${RESOLVEAGENT_LLM_ZHIPU_API_KEY:-}
      # Telemetry
      RESOLVEAGENT_TELEMETRY_ENABLED: ${RESOLVEAGENT_TELEMETRY_ENABLED:-false}
      RESOLVEAGENT_TELEMETRY_OTLP_ENDPOINT: ${RESOLVEAGENT_TELEMETRY_OTLP_ENDPOINT:-}
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  webui:
    build:
      context: ../..
      dockerfile: deployment/docker/webui.Dockerfile
    image: ${DOCKER_REGISTRY:-ghcr.io/ai-guru-global}/resolveagent-webui:${RESOLVEAGENT_VERSION:-latest}
    container_name: resolveagent-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:80"
    depends_on:
      platform:
        condition: service_healthy
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Infrastructure Services
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: resolveagent-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${RESOLVEAGENT_DATABASE_USER:-resolveagent}
      POSTGRES_PASSWORD: ${RESOLVEAGENT_DATABASE_PASSWORD:-resolveagent}
      POSTGRES_DB: ${RESOLVEAGENT_DATABASE_DBNAME:-resolveagent}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RESOLVEAGENT_DATABASE_USER:-resolveagent} -d ${RESOLVEAGENT_DATABASE_DBNAME:-resolveagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: resolveagent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2-alpine
    container_name: resolveagent-nats
    restart: unless-stopped
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    command: ["--js", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - resolveagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  resolveagent-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
