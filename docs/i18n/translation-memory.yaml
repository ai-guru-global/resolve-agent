  source: 实现层面，本文所评估的原型由三个互补部分组成：`Go` 控制平面负责统一注册表、路由同步、模型路由和认证治理；`Python` 运行时负责智能选择器、`FTA`、`RAG`
    与技能执行；`Higress` 负责统一模型入口、限流、回退和 provider 兼容性。该分层实现使本文的方法主张与系统原型之间保持强一致性。
  target: 'At the implementation level, the evaluated prototype consists of three
    complementary layers: the `Go` control plane for the unified registry, route synchronization,
    model routing, and authentication governance; the `Python` runtime for the Intelligent
    Selector, `FTA`, `RAG`, and skill execution; and `Higress` for unified model ingress,
    rate limiting, fallback, and provider compatibility. This layered prototype is
    tightly aligned with the methodological claims of the paper.'
- source_lang: en
  target_lang: zh
