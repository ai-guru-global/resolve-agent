  source: '`IncidentBench` 采用按时间划分的训练/开发/测试切分，以降低时间邻近事件造成的信息泄漏。所有文本字段在标注前完成脱敏处理，服务标识、主机名、租户键和工单号被统一替换为稳定伪名。三位高级
