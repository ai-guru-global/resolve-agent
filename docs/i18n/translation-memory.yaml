- source_lang: zh
  target_lang: en
  source: 因此，真实运维请求具有明显的**异构性**和**时变性**。有些请求需要结构化因果分析，有些请求属于知识密集型问答，有些请求涉及权限受限的外部操作，还有一些请求更适合直接由
    LLM 进行综合判断。更进一步，即便请求语义相似，不同时间点的系统能力状态、知识库新鲜度、技能健康状况和控制平面传播延迟也可能改变最优路线。现有方案通常分别强化其中一种能力：传统
    AIOps 更强调异常检测、告警关联与故障管理 [1]；仅基于 LLM 的智能体更强调自然语言推理和灵活交互 [3,4]；工具增强型语言模型更强调工具调用能力
    [5]；检索增强模型则更强调知识对齐和事实性 [6,7,8]。然而，对于自主运维而言，真正关键的问题不是“哪一种能力最强”，而是：
  target: 'Therefore, real operational requests are inherently **heterogeneous** and
    **time-varying**. Some requests require structured causal analysis, some are knowledge-intensive
    QA, some involve privileged external actions, and others are better handled by
    direct LLM reasoning. More importantly, even for semantically similar requests,
    the optimal route may change over time because of system capability state, knowledge
    freshness, skill health, or control-plane propagation delay. Existing approaches
    typically strengthen only one side of this problem: traditional AIOps emphasizes
    anomaly detection, alert correlation, and fault management [1]; LLM-only agents
    emphasize natural-language reasoning and flexible interaction [3,4]; tool-augmented
    language models emphasize external tool use [5]; retrieval-augmented models emphasize
    grounding and factuality [6,7,8]. For autonomous operations, however, the key
    question is not “which capability is strongest,” but rather:'
