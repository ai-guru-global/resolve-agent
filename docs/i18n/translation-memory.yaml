    \ | 中 | 分离报告决策 `MTTR` 与完全闭环 `MTTR` |\n| 结论效度 | `Multi` 长尾样本数量有限 | 最困难场景的置信区间可能仍较宽\
    \ | 成对 `bootstrap`、五随机种子和分路线分析 | 中高 | 扩充长尾事件持出样本 |\n| 外部效度 | 数据主要来自企业云服务且文档较完备\
