    | -- Intent estimation | 81.2 | 31.4 | 4.0 | 16.9 |\n| -- Context enrichment |\
    \ 84.7 | 28.9 | 4.1 | 13.8 |\n| -- Temperature calibration | 87.0 | 26.8 | 4.2\
    \ | 8.7 |\n| -- Abstention | 86.1 | 27.2 | 4.1 | 9.9 |\n| -- FTA integration |\
    \ 85.4 | 33.8 | 3.9 | 7.1 |\n| -- RAG route | 87.9 | 29.3 | 4.1 | 6.8 |\n| --\
    \ Risk term in utility | 87.2 | 26.5 | 4.2 | 11.6 |\n\nTable 6 provides the core\
    \ structural finding of the paper. From `FlatRouter` to the full system, `RA`\
