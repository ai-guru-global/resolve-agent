<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#primaryGradient)" filter="url(#dropShadow)"/>
  
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="150" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Central neural network / brain icon representing AI -->
  <g transform="translate(200, 200)">
    <!-- Central hub -->
    <circle cx="0" cy="0" r="35" fill="url(#secondaryGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.9)"/>
    
    <!-- Neural connections - representing intelligent routing -->
    <!-- Top node (Workflow) -->
    <line x1="0" y1="-25" x2="0" y2="-70" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-85" r="20" fill="url(#accentGradient)"/>
    <path d="M-8,-92 L0,-78 L8,-92" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right node (Skills) -->
    <line x1="22" y1="12" x2="55" y2="45" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="60" r="20" fill="url(#accentGradient)"/>
    <path d="M62,52 L70,68 L78,52" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="66" y1="60" x2="74" y2="60" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Left node (RAG) -->
    <line x1="-22" y1="12" x2="-55" y2="45" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="-70" cy="60" r="20" fill="url(#accentGradient)"/>
    <rect x="-80" y="52" width="20" height="16" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <line x1="-76" y1="58" x2="-64" y2="58" stroke="white" stroke-width="1.5"/>
    <line x1="-76" y1="62" x2="-68" y2="62" stroke="white" stroke-width="1.5"/>
    
    <!-- Bottom node (Code Analysis) -->
    <line x1="0" y1="25" x2="0" y2="70" stroke="rgba(255,255,255,0.8)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="85" r="20" fill="url(#accentGradient)"/>
    <text x="0" y="90" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">&lt;/&gt;</text>
    
    <!-- Central "R" letter -->
    <text x="0" y="8" text-anchor="middle" fill="url(#primaryGradient)" font-family="Arial, sans-serif" font-size="28" font-weight="bold">R</text>
  </g>
  
  <!-- Orbital rings representing adaptive routing -->
  <ellipse cx="200" cy="200" rx="120" ry="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,4" transform="rotate(-20, 200, 200)"/>
  <ellipse cx="200" cy="200" rx="120" ry="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="8,4" transform="rotate(40, 200, 200)"/>
  
  <!-- Small orbiting particles -->
  <circle cx="320" cy="180" r="6" fill="#F59E0B">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="220" r="4" fill="#EC4899">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="-360 200 200" dur="12s" repeatCount="indefinite"/>
  </circle>
</svg>
