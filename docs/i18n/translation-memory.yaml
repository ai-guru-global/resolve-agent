  source: 该结果说明，温度校准和弃权机制显著提高了路线概率的可信度。对生产运维系统而言，这一点非常关键：一个过度自信但不可靠的路由器，往往比一个适度保守的路由器更危险。
  target: 'This result shows that temperature scaling and abstention substantially
    improve the reliability of route probabilities. In production operations, this
    is critical: an overconfident but unreliable router is often more dangerous than
    a moderately conservative one.'
