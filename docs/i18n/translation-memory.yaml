- source_lang: zh
  target_lang: en
  source: '**证明思路。** 由于最优与次优候选各自最多受 \(L\epsilon\) 级别扰动，最坏情况下二者间隔最多减少 \(2L\epsilon\)。只要原始间隔大于该量，排序不变。该命题给出了一致性感知正则的理论动机：它通过增大安全候选与不稳定候选之间的间隔，降低控制平面漂移导致的决策翻转概率。'
  target: '**Proof sketch.** The best and second-best candidates can each change by
    at most \\(L\epsilon\\), so their gap can shrink by at most \\(2L\epsilon\\).
    If the original gap is larger than that quantity, the ranking is preserved. This
    proposition provides the theoretical motivation for consistency-aware regularization:
    by enlarging the gap between safe and unstable candidates, it lowers the probability
    of decision flips caused by control-plane drift.'
