  source: 表 6 给出了本文最核心的结构性发现。首先，从 `FlatRouter` 到完整系统，`RA` 提升 5.4 个百分点，`MTTR` 降低 4.7
    分钟，同时 `RFR@3s` 从 13.5% 降至 5.6%，相对下降 58.5%。这直接支持了命题 2 和命题 3：**层次化决策与一致性感知正则并非仅改善离线准确率，更能显著提高在控制面扰动下的决策稳定性。**
    其次，在传统组件中，意图估计、上下文增强和 `FTA` 集成仍是最大收益来源，这说明系统的整体提升既来自新提出的理论机制，也来自结构化诊断与上下文建模的协同。
  target: 'Table 6 provides the core structural finding of the paper. From `FlatRouter`
    to the full system, `RA` improves by 5.4 points, `MTTR` decreases by 4.7 minutes,
    and `RFR@3s` drops from 13.5% to 5.6%, a relative decrease of 58.5%. This directly
    supports Propositions 2 and 3: **hierarchical decision making and consistency-aware
    regularization do not merely improve offline accuracy, but also substantially
    improve decision stability under control-plane perturbation**. Among conventional
    components, intent estimation, context enrichment, and `FTA` integration remain
    the largest sources of gain, indicating that the overall improvement comes from
    the interplay between the new theory and structured diagnosis/context modeling.'
