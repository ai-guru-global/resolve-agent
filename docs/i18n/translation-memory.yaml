- source_lang: zh
  target_lang: en
  source: 自主 IT 运维的关键难点并不只是模型推理能力不足，而是在异构任务、受限权限和动态基础设施状态下，系统如何把请求分配到正确的推理与执行机制。真实生产事件常常同时涉及结构化诊断、运维知识检索、安全工具执行、配置一致性校验以及对不确定性的保守处理。本文提出
    **ResolveAgent**：一个统一的 AIOps 平台，通过**一致性感知的层次化效用校准智能选择器**在 `FTA`、`RAG`、`Skill`、`Direct-LLM`
    和受预算约束的 `Multi` 五类执行模式之间进行路由。与现有仅做单阶段标签分类或仅做 LLM 工具选择的系统不同，ResolveAgent 将路由形式化为一个同时覆盖**执行基底选择**与**目标/模型实例选择**的双层受约束优化问题，并显式将任务质量、响应延迟、执行成本、操作风险以及控制平面一致性差异纳入统一目标函数。围绕该目标，本文提出三项新的技术机制：1)
    基于能力图与权限快照的可行性裁剪；2) 面向注册表漂移的控制平面一致性正则项与反事实稳定性训练目标；3) 以证据价值为触发条件的有界 `Multi` 路由。系统实现上，ResolveAgent
    将 `Go` 控制平面中的统一注册表、动态路由同步器和 `Higress` 模型路由层，与 `Python` 运行时中的意图估计、上下文增强、`FTA` 评估器和技能执行底座协同组织为单一真相源架构。基于
    2,847 条脱敏生产事件、5,000 条运维问答和 500 个工具执行样例的实验表明，`ResolveAgent-Hybrid` 达到 89.3% 路由准确率、83.5%
    目标选择准确率和 25.1 分钟事件 `MTTR`，相较人工流程将 `MTTR` 降低 47%，相较仅基于 LLM 的路由器进一步降低 15%。更重要的是，层次化决策、一致性感知正则和反事实稳定性目标将
    3 秒注入式注册表延迟下的路线翻转率从 13.5% 降至 5.6%，在校准、鲁棒性、安全治理和真实应用场景中均表现出显著优势。结果表明，顶会级自主运维研究的核心创新不应局限于“更强的模型”，而应转向**受治理约束的层次化决策、结构化证据消费以及控制平面一致性驱动的系统设计**。
  target: 'The core challenge of autonomous IT operations is not merely insufficient
    model reasoning power, but how to assign each request to the correct reasoning
    and execution mechanism under heterogeneous tasks, constrained permissions, and
    dynamic infrastructure states. Real production incidents often require structured
    diagnosis, operational knowledge retrieval, safe tool execution, configuration-consistency
    validation, and conservative handling of uncertainty at the same time. This paper
    presents **ResolveAgent**, a unified AIOps platform that routes requests among
    `FTA`, `RAG`, `Skill`, `Direct-LLM`, and budget-bounded `Multi` through a **consistency-aware
    hierarchical utility-calibrated Intelligent Selector**. Unlike prior systems that
    either perform only single-stage label classification or rely on LLM-only tool
    choice, ResolveAgent formulates routing as a two-level constrained optimization
    problem that jointly selects the **execution substrate** and the **target/model
    instance**, while explicitly incorporating task quality, latency, execution cost,
    operational risk, and control-plane consistency discrepancy into a unified objective.
    Around this objective, we introduce three new technical mechanisms: 1) capability-graph
    and permission-snapshot based feasibility pruning; 2) a control-plane consistency
    regularizer and counterfactual stability objective for registry drift; and 3)
    a bounded `Multi` route triggered by evidence value. At the system level, ResolveAgent
    organizes the `Go` control plane with a unified registry, dynamic route synchronizer,
    and `Higress` model-routing layer together with the `Python` runtime for intent
    estimation, context enrichment, `FTA` evaluators, and permission-bounded skill
    execution as a Single Source of Truth architecture. Experiments on 2,847 anonymized
    production incidents, 5,000 operations QA pairs, and 500 tool-execution cases
    show that `ResolveAgent-Hybrid` achieves 89.3% routing accuracy, 83.5% target-selection
    accuracy, and 25.1-minute incident `MTTR`, reducing `MTTR` by 47% relative to
    manual workflows and by an additional 15% relative to an LLM-only router. More
    importantly, hierarchical decision making, consistency-aware regularization, and
    the counterfactual stability objective reduce route flip rate under injected 3-second
    registry lag from 13.5% to 5.6%, while also improving calibration, robustness,
    governance, and real-world scenario performance. The results suggest that the
    decisive innovations for conference-level autonomous operations research should
    move beyond “stronger models” toward **governance-constrained hierarchical decision
    making, structured evidence consumption, and control-plane consistency-driven
    system design**.'
