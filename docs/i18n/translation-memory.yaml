- source_lang: zh
  target_lang: en
  source: 本文提出 ResolveAgent：一个将运维路由建模为**一致性感知层次化效用校准决策问题**的统一 AIOps 平台。该框架通过结合层次化执行基底—目标路由、反事实稳定性训练、AI
    增强型故障树、安全技能执行和单一真相源控制平面，同时提升了路由质量、事件解决效率、置信度校准水平、控制面稳定性和治理稳健性。更重要的是，本文给出的不是某个局部模块的改进，而是一种关于**自主
    IT 运维系统应如何组织**的更一般回答：与其追求一个无约束的统一大模型智能体，不如在推理、检索、执行和控制平面之间进行受治理的、可解释的、显式约束的层次化分配。未来工作应进一步关注漂移条件下的自适应重校准、回滚感知的长时程修复规划，以及跨组织、跨领域和高监管环境中的泛化评估。
  target: We presented ResolveAgent, a unified AIOps platform that formulates operational
    routing as a **consistency-aware hierarchical utility-calibrated decision problem**.
    By combining hierarchical substrate–target routing, counterfactual stability training,
    AI-augmented fault trees, safe skill execution, and a Single Source of Truth control
    plane, the framework simultaneously improves routing quality, incident-resolution
    efficiency, confidence calibration, control-plane stability, and governance robustness.
    More importantly, the paper does not merely improve one isolated module; it offers
    a more general answer to **how autonomous IT-operations systems should be organized**.
    Instead of pursuing one unconstrained monolithic agent, it is more effective to
    perform governed, interpretable, explicitly constrained hierarchical allocation
    across reasoning, retrieval, execution, and control-plane layers. Future work
    should investigate adaptive recalibration under drift, rollback-aware long-horizon
    remediation planning, and generalization across organizations, domains, and highly
    regulated environments.
