syntax = "proto3";

package resolvenet.v1;

option go_package = "github.com/ai-guru-global/resolve-net/pkg/api/resolvenet/v1;resolvenetv1";

import "resolvenet/v1/common.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// WorkflowService manages FTA workflow definitions and execution.
service WorkflowService {
  rpc CreateWorkflow(CreateWorkflowRequest) returns (Workflow);
  rpc GetWorkflow(GetWorkflowRequest) returns (Workflow);
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (Workflow);
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse);
  rpc ValidateWorkflow(ValidateWorkflowRequest) returns (ValidateWorkflowResponse);
  rpc ExecuteWorkflow(ExecuteWorkflowRequest) returns (stream WorkflowEvent);
}

// Workflow definition
message Workflow {
  ResourceMeta meta = 1;
  FaultTree tree = 2;
  WorkflowStatus status = 3;
}

enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;
  WORKFLOW_STATUS_DRAFT = 1;
  WORKFLOW_STATUS_ACTIVE = 2;
  WORKFLOW_STATUS_ARCHIVED = 3;
}

// Fault Tree structure
message FaultTree {
  string top_event_id = 1;
  repeated FTAEvent events = 2;
  repeated FTAGate gates = 3;
}

// FTA Event (node in the tree)
message FTAEvent {
  string id = 1;
  string name = 2;
  string description = 3;
  FTAEventType type = 4;
  string evaluator = 5; // e.g., "skill:web-search", "rag:collection-id", "llm:classify"
  google.protobuf.Struct parameters = 6;
}

enum FTAEventType {
  FTA_EVENT_TYPE_UNSPECIFIED = 0;
  FTA_EVENT_TYPE_TOP = 1;
  FTA_EVENT_TYPE_INTERMEDIATE = 2;
  FTA_EVENT_TYPE_BASIC = 3;
  FTA_EVENT_TYPE_UNDEVELOPED = 4;
  FTA_EVENT_TYPE_CONDITIONING = 5;
}

// FTA Gate (logical connector)
message FTAGate {
  string id = 1;
  string name = 2;
  FTAGateType type = 3;
  repeated string input_ids = 4;
  string output_id = 5;
  int32 k_value = 6; // For VOTING gate: k-of-n threshold
}

enum FTAGateType {
  FTA_GATE_TYPE_UNSPECIFIED = 0;
  FTA_GATE_TYPE_AND = 1;
  FTA_GATE_TYPE_OR = 2;
  FTA_GATE_TYPE_VOTING = 3;
  FTA_GATE_TYPE_INHIBIT = 4;
  FTA_GATE_TYPE_PRIORITY_AND = 5;
}

// Workflow execution events (streamed)
message WorkflowEvent {
  string workflow_id = 1;
  string execution_id = 2;
  WorkflowEventType type = 3;
  string node_id = 4;
  string message = 5;
  google.protobuf.Struct data = 6;
  google.protobuf.Timestamp timestamp = 7;
}

enum WorkflowEventType {
  WORKFLOW_EVENT_TYPE_UNSPECIFIED = 0;
  WORKFLOW_EVENT_TYPE_STARTED = 1;
  WORKFLOW_EVENT_TYPE_NODE_EVALUATING = 2;
  WORKFLOW_EVENT_TYPE_NODE_COMPLETED = 3;
  WORKFLOW_EVENT_TYPE_GATE_EVALUATING = 4;
  WORKFLOW_EVENT_TYPE_GATE_COMPLETED = 5;
  WORKFLOW_EVENT_TYPE_COMPLETED = 6;
  WORKFLOW_EVENT_TYPE_FAILED = 7;
}

// Request/Response messages
message CreateWorkflowRequest {
  Workflow workflow = 1;
}

message GetWorkflowRequest {
  string id = 1;
}

message ListWorkflowsRequest {
  PaginationRequest pagination = 1;
}

message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
  PaginationResponse pagination = 2;
}

message UpdateWorkflowRequest {
  Workflow workflow = 1;
}

message DeleteWorkflowRequest {
  string id = 1;
}

message DeleteWorkflowResponse {}

message ValidateWorkflowRequest {
  FaultTree tree = 1;
}

message ValidateWorkflowResponse {
  bool valid = 1;
  repeated string errors = 2;
  repeated string warnings = 3;
}

message ExecuteWorkflowRequest {
  string workflow_id = 1;
  google.protobuf.Struct context = 2;
}
