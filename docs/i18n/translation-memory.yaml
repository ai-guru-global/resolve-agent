  source: 一个具有代表性的案例是数据库延迟事件。初始症状摘要看起来像普通的查询计划问题，`LLMRouter` 因此选择 `Direct-LLM` 并建议检查索引；而
    `ResolveAgent` 首先选择 `FTA`，随后发现实时副本延迟证据不足，于是有界地升级到 `Skill` 路线以获取监控指标。最终系统识别出根因是后台批处理任务被限流后造成复制积压，并建议“暂停任务—重新检查队列深度”的修复动作。该事件在
    17 分钟内被解决，且形成了完整证据链；相应的 `LLM-only` 路径则需要人工修正，总耗时 34 分钟。附录中的净化案例轨迹和更多案例表明，`Multi`
    的价值并不在于“多试几条路”，而在于**先保留审计链，再在预算内补齐证据**。
  target: A representative example is a database-latency incident. The initial symptom
    summary resembled a generic query-planning issue, so `LLMRouter` selected `Direct-LLM`
    and recommended index inspection. `ResolveAgent`, however, first selected `FTA`
    and then detected that live replica-lag evidence was missing, which triggered
    a bounded escalation to the `Skill` route for monitoring signals. The system ultimately
    identified the true cause as replication backlog induced by a throttled background
    batch job and recommended a “pause the job, then re-check queue depth” action.
    The incident was resolved in 17 minutes with a complete evidence chain, whereas
    the `LLM-only` path required manual correction and took 34 minutes. The sanitized
    case trace and additional examples in the appendix show that the value of `Multi`
    is not in “trying more paths,” but in **preserving the audit chain first and filling
    evidence gaps within budget**.
