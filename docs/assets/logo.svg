<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Yellow glow gradient -->
    <linearGradient id="yellowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC000"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
    
    <!-- Outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow for nodes -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Black background circle -->
  <circle cx="100" cy="100" r="95" fill="#0D0D0D"/>
  
  <!-- Outer yellow ring with glow -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#yellowGlow)" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#yellowGlow)" stroke-width="1" stroke-dasharray="8 12" opacity="0.6"/>
  
  <!-- Central hub - dark with yellow border -->
  <circle cx="100" cy="100" r="35" fill="#1A1A1A" stroke="url(#yellowGlow)" stroke-width="2"/>
  
  <!-- "R" letter in yellow -->
  <text x="100" y="115" text-anchor="middle" fill="url(#yellowGlow)" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" filter="url(#glow)">R</text>
  
  <!-- Four routing nodes with glow - representing 4 core capabilities -->
  <!-- Top: Expert Skills -->
  <circle cx="100" cy="38" r="10" fill="url(#yellowGlow)" filter="url(#nodeGlow)"/>
  <line x1="100" y1="48" x2="100" y2="65" stroke="url(#yellowGlow)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Right: FTA Workflow -->
  <circle cx="162" cy="100" r="10" fill="url(#yellowGlow)" filter="url(#nodeGlow)"/>
  <line x1="152" y1="100" x2="135" y2="100" stroke="url(#yellowGlow)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Bottom: RAG Knowledge -->
  <circle cx="100" cy="162" r="10" fill="url(#yellowGlow)" filter="url(#nodeGlow)"/>
  <line x1="100" y1="152" x2="100" y2="135" stroke="url(#yellowGlow)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Left: Code Analysis -->
  <circle cx="38" cy="100" r="10" fill="url(#yellowGlow)" filter="url(#nodeGlow)"/>
  <line x1="48" y1="100" x2="65" y2="100" stroke="url(#yellowGlow)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Corner accent dots -->
  <circle cx="58" cy="58" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="142" cy="58" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="142" cy="142" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="58" cy="142" r="3" fill="#FFD700" opacity="0.5"/>
</svg>
